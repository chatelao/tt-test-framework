# JSON Schema for Test Steps in YAML format
$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  project:
    type: string
  signals:
    type: object
    additionalProperties:
      type: object
      properties:
        type:
          type: string
          enum: [input, output, inout, clock]
        width:
          type: integer
          minimum: 1
      required: [type, width]
  test_steps:
    $ref: "#/definitions/test_steps"
  test_cases:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        test_steps:
          $ref: "#/definitions/test_steps"
      required: [name, test_steps]
definitions:
  test_steps:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        cycles:
          type: integer
          minimum: 1
        values:
          type: object
          additionalProperties:
            oneOf:
              - type: integer
              - type: string
      required: [name, cycles, values]
required: [project, signals]
oneOf:
  - required: [test_steps]
  - required: [test_cases]
