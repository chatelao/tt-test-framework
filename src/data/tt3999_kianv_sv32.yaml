project: KianV SV32 TT Linux SoC
metadata:
  source: https://github.com/splinedrive/kianv-sv32-tt-linux-soc
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Boot
  cycles: 20
  values: {rst_n: 1, ui_in: 0x80, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3999_ui_in
    reg:
      reg:
      - name: GPIO IN 0
        bits: 1
      - name: GPIO IN 1
        bits: 1
      - name: SPI MISO
        bits: 1
      - name: GPIO IN 3
        bits: 1
      - name: GPIO IN 4
        bits: 1
      - name: GPIO IN 5
        bits: 1
      - name: GPIO IN 6
        bits: 1
      - name: UART RX
        bits: 1
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3999_uo_out
    reg:
      reg:
      - name: UART TX
        bits: 1
      - name: GPIO0 OUT
        bits: 1
      - name: SPI CS1
        bits: 1
      - name: SPI MOSI
        bits: 1
      - name: SPI CS0
        bits: 1
      - name: SPI SCLK
        bits: 1
      - name: SPI CS2
        bits: 1
      - name: SPI CS3
        bits: 1
      config:
        hspace: 800
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3999_uio_in
    reg:
      reg:
      - name: KVSMEM SS_N
        bits: 1
      - name: KVSMEM SIO0
        bits: 1
      - name: KVSMEM SIO1
        bits: 1
      - name: KVSMEM SCLK
        bits: 1
      - name: KVSMEM SIO2
        bits: 1
      - name: KVSMEM SIO3
        bits: 1
      - name: KVSMEM CSN0
        bits: 1
      - name: KVSMEM CSN1
        bits: 1
      config:
        hspace: 800
