project: "Simon Says"
metadata:
  source: "https://github.com/dabro02/Daniel-s-Wokwi-Design"
  project_id: "3600"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UO_OUT: 0

  - name: "Load 1010"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0x8A
      UO_OUT: 0

  - name: "Shift 1"
    cycles: 1
    values:
      UI_IN: 0x00
      UO_OUT: 0x80

  - name: "Shift 2"
    cycles: 1
    values:
      UI_IN: 0x00
      UO_OUT: 0x00

  - name: "Shift 3"
    cycles: 1
    values:
      UI_IN: 0x00
      UO_OUT: 0x80

  - name: "Shift 4"
    cycles: 1
    values:
      UI_IN: 0x00
      UO_OUT: 0x00
