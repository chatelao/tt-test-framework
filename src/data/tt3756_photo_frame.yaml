project: "Photo Frame"
metadata:
  source: "https://github.com/MichaelBell/ttihp26a-photo-frame"
signals:
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
  uo_out:
    type: "output"
    width: 8
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    uo_out: 0
- name: "Operation"
  cycles: 5
  values:
    rst_n: 1
bitfields:
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3756_uo_out
    reg:
      reg:
      - name: R[1]
        bits: 1
      - name: G[1]
        bits: 1
      - name: B[1]
        bits: 1
      - name: vsync
        bits: 1
      - name: R[0]
        bits: 1
      - name: G[0]
        bits: 1
      - name: B[0]
        bits: 1
      - name: hsync
        bits: 1
      config:
        hspace: 800
