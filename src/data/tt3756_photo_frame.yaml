project: "Photo Frame"
metadata:
  source: "https://github.com/MichaelBell/ttihp26a-photo-frame"
signals:
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
  uo_out:
    type: "output"
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      uo_out: 0
  - name: "Operation"
    cycles: 5
    values:
      rst_n: 1
