project: "tiny_tester"
metadata:
  source: "https://github.com/jalcim/tiny_tester"
  project_id: "3740"
signals:
  clk:
    type: clock
    width: 1
  rst_n:
    type: input
    width: 1
  UI_IN:
    type: input
    width: 8
  UO_OUT:
    type: output
    width: 8
  UIO_IN:
    type: input
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      clk: 0
      rst_n: 0
      UI_IN: 0
      UIO_IN: 0
  - name: "Wait for reset"
    cycles: 1
    values:
      clk: 1
      rst_n: 0
  - name: "Select Brent-Kung Adder"
    cycles: 1
    values:
      clk: 0
      rst_n: 1
      UI_IN: 0b00000000 # ctrl = 00, i_demux_1 = 0
  - name: "Set A and B for Adder"
    cycles: 1
    values:
      clk: 1
      UI_IN: 0b00000101 # A = 5
      UIO_IN: 0b00000011 # B = 3
  - name: "Verify Addition"
    cycles: 1
    values:
      clk: 0
      UO_OUT: 8
