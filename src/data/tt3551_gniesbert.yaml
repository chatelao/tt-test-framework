project: "Mein Hund Gniesbert (Adder for 3)"
metadata:
  source: "https://github.com/sisarikaya/mytiny"
signals:
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8
test_steps:
  - name: "Sum to 3 (Case 1)"
    cycles: 1
    values:
      UI_IN: 0x03 # 1 + 2
      UO_OUT: 0x47 # segments for '3' or something similar
  - name: "Sum to 3 (Case 2)"
    cycles: 1
    values:
      UI_IN: 0x05 # 1 + 4 (if bit 2 is 4)
      UO_OUT: 0x47
  - name: "Not 3"
    cycles: 1
    values:
      UI_IN: 0x01
      UO_OUT: 0x00
