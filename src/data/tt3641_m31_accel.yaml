project: "M31 Mersenne-31 Arithmetic Accelerator"
metadata:
  source: "https://github.com/brmurrell3/tt_um_brmurrell3_m31_accel"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  uio_in:
    type: "input"
    width: 8
  uio_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    ui_in: 0
    uio_in: 0
- name: "Load A = 10 (Byte 0)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 0
    ui_in: 0x0A
- name: "Load A = 10 (Byte 1-3)"
  cycles: 3
  values:
    rst_n: 1
    uio_in: 0
    ui_in: 0x00
- name: "Load B = 20 (Byte 0)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 2
    ui_in: 0x14
- name: "Load B = 20 (Byte 1-3)"
  cycles: 3
  values:
    rst_n: 1
    uio_in: 2
    ui_in: 0x00
- name: "Execute ADD (A = A + B = 10 + 20 = 30)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 1
    ui_in: 1
- name: "NOP (Reset Read Counter)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 0
    ui_in: 0
- name: "Read A (Result 30, Byte 0)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 4
    uo_out: 30
- name: "Read A (Result 30, Byte 1-3)"
  cycles: 3
  values:
    rst_n: 1
    uio_in: 4
    uo_out: 0
- name: "Load B = 5 (Byte 0)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 2
    ui_in: 0x05
- name: "Load B = 5 (Byte 1-3)"
  cycles: 3
  values:
    rst_n: 1
    uio_in: 2
    ui_in: 0x00
- name: "Execute SUB (A = A - B = 30 - 5 = 25)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 1
    ui_in: 2
- name: "NOP (Reset Read Counter)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 0
    ui_in: 0
- name: "Read A (Result 25, Byte 0)"
  cycles: 1
  values:
    rst_n: 1
    uio_in: 4
    uo_out: 25
- name: "Read A (Result 25, Byte 1-3)"
  cycles: 3
  values:
    rst_n: 1
    uio_in: 4
    uo_out: 0
bitfields:
- name: Control Mapping (uio_in)
  items:
  - signal: uio_in
    description: Command and Register Selection
    svg: tt3641_uio_in_ctrl
    reg:
      reg:
      - name: CMD_EN
        bits: 1
      - name: REG_SEL[0]
        bits: 1
      - name: RW
        bits: 1
      - name: REG_SEL[1]
        bits: 1
      - bits: 4
        name: unused
      config:
        hspace: 800
