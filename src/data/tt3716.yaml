project: "Tiny Tapeout chip"
metadata:
  source: "https://github.com/Birkwk/Chip"
signals:
  CLK: {name: "CLK", type: "clock", width: 1}
  RST_N: {name: "RST_N", type: "input", width: 1}
  UI_IN: {name: "UI_IN", type: "input", width: 8}
  UO_OUT: {name: "UO_OUT", type: "output", width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UI_IN: 0
  - name: "Load 0"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0
  - name: "Load 1 (IN0=1, IN1=1)"
    cycles: 1
    values:
      UI_IN: 3
  - name: "Wait"
    cycles: 1
    values:
      UI_IN: 0
  - name: "Toggle"
    cycles: 1
    values:
      UI_IN: 3
