project: Canright SBOX
metadata:
  source: https://github.com/coastalwhite/tinytapeout-ihp-canright
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
  - name: Reset
    cycles: 1
    values: {ui_in: 0, uio_in: 0, rst_n: 0}
  - name: SBOX mapping 0x00 -> 0x63
    cycles: 1
    values: {ui_in: 0x00, rst_n: 1}
  - name: SBOX mapping 0x01 -> 0x7c
    cycles: 1
    values: {ui_in: 0x01, rst_n: 1}
  - name: SBOX mapping 0xFF -> 0x16
    cycles: 1
    values: {ui_in: 0xFF, rst_n: 1}
