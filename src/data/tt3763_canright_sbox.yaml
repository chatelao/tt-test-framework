project: Canright SBOX
metadata:
  source: https://github.com/coastalwhite/tinytapeout-ihp-canright
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {ui_in: 0, uio_in: 0, rst_n: 0}
- name: SBOX mapping 0x00 -> 0x63
  cycles: 1
  values: {ui_in: 0x00, rst_n: 1}
- name: SBOX mapping 0x01 -> 0x7c
  cycles: 1
  values: {ui_in: 0x01, rst_n: 1}
- name: SBOX mapping 0xFF -> 0x16
  cycles: 1
  values: {ui_in: 0xFF, rst_n: 1}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3763_ui_in
    reg:
      reg:
      - name: DATA_I[0]
        bits: 1
      - name: DATA_I[1]
        bits: 1
      - name: DATA_I[2]
        bits: 1
      - name: DATA_I[3]
        bits: 1
      - name: DATA_I[4]
        bits: 1
      - name: DATA_I[5]
        bits: 1
      - name: DATA_I[6]
        bits: 1
      - name: DATA_I[7]
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3763_uo_out
    reg:
      reg:
      - name: DATA_O[0]
        bits: 1
      - name: DATA_O[1]
        bits: 1
      - name: DATA_O[2]
        bits: 1
      - name: DATA_O[3]
        bits: 1
      - name: DATA_O[4]
        bits: 1
      - name: DATA_O[5]
        bits: 1
      - name: DATA_O[6]
        bits: 1
      - name: DATA_O[7]
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3763_uio_in
    reg:
      reg:
      - name: STATE[0]
        bits: 1
      - name: STATE[1]
        bits: 1
      - bits: 6
        name: unused
      config:
        hspace: 800
        bits: 8
