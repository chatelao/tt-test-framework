project: "Test"
metadata:
  source: "https://github.com/LordTaek/GDS_Creator"
  project_id: "3610"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UO_OUT: 0

  - name: "Enable dot"
    cycles: 2
    values:
      RST_N: 1
      UI_IN: 2
      UO_OUT: 0x80

  - name: "Clocked Pins"
    cycles: 2
    values:
      UI_IN: 1
      UO_OUT: 0x81
