project: "Verilog ring oscillator V2"
metadata:
  source: "https://github.com/ChiranjitPatel/tt_ihp26a_ringosc_stdcell"
signals:
  UI_IN:
    type: "input"
    width: 8
  CLK:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UO_OUT:
    type: "output"
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      UI_IN: 0x00
      RST_N: 0
      UO_OUT: 0x00
  - name: "Idle"
    cycles: 1
    values:
      UI_IN: 0x00
      RST_N: 1
      UO_OUT: 0x00
  - name: "Input Toggling 1"
    cycles: 1
    values:
      UI_IN: 0x01
      UO_OUT: 0x00
  - name: "Input Toggling 2"
    cycles: 1
    values:
      UI_IN: 0x00
      UO_OUT: 0x00
