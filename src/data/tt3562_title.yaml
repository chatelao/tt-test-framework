project: "7-Segment Adder (0, 1, 2)"
metadata:
  source: "https://github.com/Ancash/tt"
signals:
  ui[0]: {name: "A", type: input, width: 1}
  ui[1]: {name: "B", type: input, width: 1}
  uo[0:6]: {name: "UO_7SEG", type: output, width: 7}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ui[0]: 0
      ui[1]: 0
  - name: "0 + 0 = 0"
    cycles: 1
    values:
      ui[0]: 0
      ui[1]: 0
      uo[0:6]: 0x3F # Segments abcdef (0)
  - name: "1 + 0 = 1"
    cycles: 1
    values:
      ui[0]: 1
      ui[1]: 0
      uo[0:6]: 0x06 # Segments bc (1)
  - name: "0 + 1 = 1"
    cycles: 1
    values:
      ui[0]: 0
      ui[1]: 1
      uo[0:6]: 0x06 # Segments bc (1)
  - name: "1 + 1 = 2"
    cycles: 1
    values:
      ui[0]: 1
      ui[1]: 1
      uo[0:6]: 0x5B # Segments abdeg (2)
