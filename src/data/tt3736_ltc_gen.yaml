project: "Linear Timecode (LTC) generator"
metadata:
  source: "https://github.com/flummer/tt-um-flummer-ltc"
  project_id: "3736"
signals:
  clk:
    type: clock
    width: 1
  rst_n:
    type: input
    width: 1
  UI_IN:
    type: input
    width: 8
  UO_OUT:
    type: output
    width: 8
  UIO:
    type: inout
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      clk: 0
      rst_n: 0
      UI_IN: 0
      UIO: 0
  - name: "Wait for reset"
    cycles: 1
    values:
      clk: 1
      rst_n: 0
  - name: "Set framerate 0"
    cycles: 1
    values:
      clk: 0
      rst_n: 1
      UI_IN: 0b00000000
  - name: "Watch LTC"
    cycles: 10
    values:
      clk: 1
  - name: "Simple logic test"
    cycles: 1
    values:
      clk: 0
      UI_IN: 0b11110011
  - name: "Verify UO_OUT[0]"
    cycles: 1
    values:
      clk: 1
      UO_OUT: 1
