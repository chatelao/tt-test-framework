project: "Piggybag"
metadata:
  source: "https://github.com/Fing2525/piggy_bag"
signals:
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8
  CLK:
    type: "clock"
    width: 1
  RST_N:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UI_IN: 0x00
      UO_OUT: 0x00
  - name: "Pattern 1"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0x55
  - name: "Pattern 2"
    cycles: 1
    values:
      UI_IN: 0xAA
