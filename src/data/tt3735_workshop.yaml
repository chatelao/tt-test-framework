project: "Workshop"
metadata:
  source: "https://github.com/MikkelKofoed/TinyTapeoutWorkshop"
  project_id: "3735"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UO_OUT: 0

  - name: "AND logic 00"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0b00000000
      UO_OUT: 0x00

  - name: "AND logic 11"
    cycles: 1
    values:
      UI_IN: 0b00000011
      UO_OUT: 0x01

  - name: "Pass-through"
    cycles: 1
    values:
      UI_IN: 0b11111100
      UO_OUT: 0xFC
