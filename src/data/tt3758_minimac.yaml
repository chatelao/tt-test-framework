project: miniMAC
metadata:
  source: https://github.com/YannGuidon/miniMAC_tx
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {ui_in: 0, uio_in: 0, rst_n: 0}
- name: Idle after reset
  cycles: 2
  values: {ui_in: 0, uio_in: 0, rst_n: 1}
- name: Apply pattern
  cycles: 2
  values: {ui_in: 0xAA, uio_in: 0x55, rst_n: 1}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3758_ui_in
    reg:
      reg:
      - name: DI0
        bits: 1
      - name: DI1
        bits: 1
      - name: DI2
        bits: 1
      - name: DI3
        bits: 1
      - name: DI4
        bits: 1
      - name: DI5
        bits: 1
      - name: DI6
        bits: 1
      - name: DI7
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3758_uo_out
    reg:
      reg:
      - name: DO0
        bits: 1
      - name: DO1
        bits: 1
      - name: DO2
        bits: 1
      - name: DO3
        bits: 1
      - name: DO4
        bits: 1
      - name: DO5
        bits: 1
      - name: DO6
        bits: 1
      - name: DO7
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3758_uio_in
    reg:
      reg:
      - name: D08
        bits: 1
      - name: QEN
        bits: 1
      - name: CLK_out
        bits: 1
      - name: Zero
        bits: 1
      - name: Enc
        bits: 1
      - name: Dec
        bits: 1
      - name: DEN
        bits: 1
      - name: DI8
        bits: 1
      config:
        hspace: 800
        bits: 8
