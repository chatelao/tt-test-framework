project: "Primitive clock divider"
metadata:
  source: "https://github.com/alexey-serdyuk/tiny_tapeout_workshop"
signals:
  uo_out:
    type: "output"
    width: 8

test_steps:
- name: "Wait for output"
  cycles: 10
  values:
    uo_out: 0x00
bitfields:
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3552_uo_out
    reg:
      reg:
      - bits: 6
        name: unused
      - name: output out6
        bits: 1
      - name: output out7
        bits: 1
      config:
        hspace: 800
        bits: 8
