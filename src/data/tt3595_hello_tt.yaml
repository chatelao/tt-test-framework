project: "Hello tinyTapout"
metadata:
  source: "https://github.com/SinnMachen/nein"
  project_id: "3595"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UO_OUT: 0

  - name: "Pass-through AA"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0xAA
      UO_OUT: 0xAA

  - name: "Pass-through 55"
    cycles: 1
    values:
      UI_IN: 0x55
      UO_OUT: 0x55
