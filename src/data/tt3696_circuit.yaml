project: "Alex first circuit (Johnson counter)"
metadata:
  source: "https://github.com/5gyyzwxbd4-svg/First"
signals:
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      uo_out: 0
  - name: "Step 1"
    cycles: 1
    values:
      rst_n: 1
      uo_out: 0b00000001
  - name: "Step 2"
    cycles: 1
    values:
      rst_n: 1
      uo_out: 0b00000011
  - name: "Step 3"
    cycles: 1
    values:
      rst_n: 1
      uo_out: 0b01000011
