project: "ADPLL"
metadata:
  source: "https://github.com/chrbirks/tt-2026"
  project_id: "3738"
signals:
  clk:
    type: clock
    width: 1
  rst_n:
    type: input
    width: 1
  UO_OUT:
    type: output
    width: 8
  UIO:
    type: inout
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      clk: 0
      rst_n: 0
  - name: "Wait for reset"
    cycles: 1
    values:
      clk: 1
      rst_n: 0
  - name: "Run"
    cycles: 20
    values:
      clk: 1
      rst_n: 1
