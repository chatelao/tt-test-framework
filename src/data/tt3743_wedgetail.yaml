project: "Wedgetail TCDE REV01"
metadata:
  source: "https://github.com/SiliconPlatformsLab/wedgetail-tester-tt-ihp26a"
  project_id: "3743"
signals:
  clk:
    type: clock
    width: 1
  rst_n:
    type: input
    width: 1
  UI_IN:
    type: input
    width: 8
  UO_OUT:
    type: output
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      clk: 0
      rst_n: 0
      UI_IN: 0
  - name: "Wait for reset"
    cycles: 1
    values:
      clk: 1
      rst_n: 0
  - name: "Watch LFSR"
    cycles: 10
    values:
      clk: 1
      rst_n: 1
  - name: "SPI MISO test"
    cycles: 1
    values:
      clk: 0
      UI_IN: 0b01000000 # CS=1, MOSI=0
  - name: "Check MISO"
    cycles: 1
    values:
      clk: 1
      UO_OUT: 0b00100000 # UO_OUT[5] = MISO
