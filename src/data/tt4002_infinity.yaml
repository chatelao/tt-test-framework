project: "Infinity Core"
metadata:
  source: "https://github.com/FilteredNoise/tt-infinity-core"
signals:
  CLK: {name: 'CLK', type: clock, width: 1}
  RST_N: {name: 'RST_N', type: input, width: 1}
  SCK: {name: 'SCK', type: output, width: 1}
  MOSI: {name: 'MOSI', type: output, width: 1}
  DC: {name: 'DC', type: output, width: 1}
test_steps:
  - name: "Reset"
    cycles: 2
    values:
      RST_N: 0
  - name: "Active"
    cycles: 100
    values:
      RST_N: 1
