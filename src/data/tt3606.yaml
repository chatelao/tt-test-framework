project: "Tiny Tapeout Accumulator"
metadata:
  source: "https://github.com/alpblkba/tiny-tapeout-chip-design"
signals:
  UI_IN: {name: "UI_IN", type: "input", width: 8}
  UO_OUT: {name: "UO_OUT", type: "output", width: 8}
test_steps:
  - name: "All Zeros"
    cycles: 1
    values:
      UI_IN: 0
  - name: "All Ones"
    cycles: 1
    values:
      UI_IN: 255
  - name: "Alternating"
    cycles: 1
    values:
      UI_IN: 170
  - name: "Alternating Inv"
    cycles: 1
    values:
      UI_IN: 85
