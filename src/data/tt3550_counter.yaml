project: "(Hexa)Decimal Counter"
metadata:
  source: "https://github.com/elFuchso/tinytapeout-wokwi"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8

test_steps:
  - name: "Initial state"
    cycles: 1
    values:
      ui_in: 0
  - name: "Select Decimal"
    cycles: 1
    values:
      ui_in: 1
  - name: "Select Hexadecimal"
    cycles: 1
    values:
      ui_in: 2
