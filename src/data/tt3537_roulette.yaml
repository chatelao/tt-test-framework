project: "6 Bit Roulette"
metadata:
  source: "https://github.com/svens0210/Roulette_Game"
signals:
  UO_OUT:
    type: "output"
    width: 8
  CLK:
    type: "clock"
    width: 1
  RST_N:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UO_OUT: 0x00
  - name: "Idle"
    cycles: 5
    values:
      RST_N: 1
