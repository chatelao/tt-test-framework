project: Tiny Tapeout placeholder
metadata:
  source: https://github.com/martaalfonso/pomasic
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Count
  cycles: 20
  values: {rst_n: 1, ui_in: 1, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3729_ui_in
    reg:
      reg:
      - name: Enable
        bits: 1
      - name: Echo
        bits: 1
      - name: Start Stop
        bits: 1
      - name: SW_aux
        bits: 1
      - bits: 4
        name: unused
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3729_uo_out
    reg:
      reg:
      - name: Segment A
        bits: 1
      - name: Segment B
        bits: 1
      - name: Segment C
        bits: 1
      - name: Segment D
        bits: 1
      - name: Segment E
        bits: 1
      - name: Segment F
        bits: 1
      - name: Segment G
        bits: 1
      - name: Segment H
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3729_uio_in
    reg:
      reg:
      - name: Digit 0
        bits: 1
      - name: Digit 1
        bits: 1
      - name: Digit 2
        bits: 1
      - name: Digit 3
        bits: 1
      - name: Trigger
        bits: 1
      - name: CSN
        bits: 1
      - name: SCLK
        bits: 1
      - name: MISO
        bits: 1
      config:
        hspace: 800
        bits: 8
