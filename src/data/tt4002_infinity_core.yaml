project: Infinity Core
metadata:
  source: https://github.com/FilteredNoise/tt-infinity-core
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Pattern Gen
  cycles: 15
  values: {rst_n: 1, ui_in: 1, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt4002_ui_in
    reg:
      reg:
      - name: Audio Trigger In (Digital Pulse)
        bits: 1
      - name: Encoder 1 Pin A (Brightness/Density)
        bits: 1
      - name: Encoder 1 Pin B (Brightness/Density)
        bits: 1
      - name: Encoder 2 Pin A (Decay Speed)
        bits: 1
      - name: Encoder 2 Pin B (Decay Speed)
        bits: 1
      - bits: 3
        name: unused
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt4002_uo_out
    reg:
      reg:
      - name: LED PWM Out
        bits: 1
      - name: SPI Clock (SCK)
        bits: 1
      - name: SPI Data (MOSI)
        bits: 1
      - name: SPI Data/Command (DC)
        bits: 1
      - name: SPI Chip Select (CS)
        bits: 1
      - name: Debug Heartbeat Blink
        bits: 1
      - bits: 2
        name: unused
      config:
        hspace: 800
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt4002_uio_in
    reg:
      reg:
      - name: Data
        bits: 8
      config:
        hspace: 800
