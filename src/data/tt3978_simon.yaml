project: SIMON
metadata:
  source: https://github.com/libormiller/ttihp-simon
signals:
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
  - name: Reset
    cycles: 1
    values: {uio_in: 0x01, rst_n: 0}
  - name: SPI Idle (CS_n high)
    cycles: 5
    values: {uio_in: 0x01, rst_n: 1}
