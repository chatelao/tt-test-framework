project: "SID Voice Synthesizer"
metadata:
  source: "https://github.com/rrrh/tiny_sid_chip"
  project_id: "3653"
signals:
  ui_in:
    name: "UI_IN"
    type: "input"
    width: 8
  uo_out:
    name: "UO_OUT"
    type: "output"
    width: 8
  uio:
    name: "UIO"
    type: "inout"
    width: 8
test_steps:
  - name: "Initial Reset"
    cycles: 5
    values:
      UI_IN: 0
      UIO: 0
  - name: "Observe PWM"
    cycles: 20
    values:
      UI_IN: 0
      UIO: 0
