project: 4-bit processor
metadata:
  source: https://github.com/alessio8132/IHP26a-4-bit-processor
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: ADD Op
  cycles: 5
  values: {rst_n: 1, ui_in: 0x15, uio_in: 0}
- name: SUB Op
  cycles: 5
  values: {rst_n: 1, ui_in: 0x23, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt4003_ui_in
    reg:
      reg:
      - name: operand[0]
        bits: 1
      - name: operand[1]
        bits: 1
      - name: operand[2]
        bits: 1
      - name: operand[3]
        bits: 1
      - name: opcode[0]
        bits: 1
      - name: opcode[1]
        bits: 1
      - name: opcode[2]
        bits: 1
      - name: opcode[3]
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt4003_uo_out
    reg:
      reg:
      - name: out_reg[0]
        bits: 1
      - name: out_reg[1]
        bits: 1
      - name: out_reg[2]
        bits: 1
      - name: out_reg[3]
        bits: 1
      - name: pc[0]
        bits: 1
      - name: pc[1]
        bits: 1
      - name: pc[2]
        bits: 1
      - name: pc[3]
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt4003_uio_in
    reg:
      reg:
      - name: Data
        bits: 8
      config:
        hspace: 800
        bits: 8
