project: tiny_dino
metadata:
  source: https://github.com/RongGi/tiny_dino
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
  - name: Reset
    cycles: 1
    values: {ui_in: 0, rst_n: 0}
  - name: Initial Sync
    cycles: 10
    values: {ui_in: 0, rst_n: 1}
