project: "Tiny tapeout and gate test"
metadata:
  source: "https://github.com/kessler-christopher/tt_chris_test"
  project_id: "3668"
signals:
  ui_in:
    name: "UI_IN"
    type: "input"
    width: 8
  uo_out:
    name: "UO_OUT"
    type: "output"
    width: 8
test_steps:
  - name: "A=0, B=0"
    cycles: 1
    values:
      UI_IN: 0b00000000
      UO_OUT: 0b00000000
  - name: "A=1, B=0"
    cycles: 1
    values:
      UI_IN: 0b00000001
      UO_OUT: 0b00000000
  - name: "A=0, B=1"
    cycles: 1
    values:
      UI_IN: 0b00000010
      UO_OUT: 0b00000000
  - name: "A=1, B=1"
    cycles: 1
    values:
      UI_IN: 0b00000011
      UO_OUT: 0b00000001
