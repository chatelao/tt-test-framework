project: "tt3546-counter"
signals:
  RST_N:
    type: "input"
    width: 1
  UO_OUT:
    type: "output"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UO_OUT: "???"

  - name: "Count 1"
    cycles: 1
    values:
      RST_N: 1
      UO_OUT: 1

  - name: "Count 2"
    cycles: 1
    values:
      RST_N: 1
      UO_OUT: 2

  - name: "Count 3"
    cycles: 1
    values:
      RST_N: 1
      UO_OUT: 3

  - name: "Count 4"
    cycles: 1
    values:
      RST_N: 1
      UO_OUT: 4
