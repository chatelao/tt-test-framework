project: "VoGAl"
metadata:
  source: "https://github.com/michaelstambach/vogal"
signals:
  UI_IN:
    type: "input"
    width: 8
  CLK:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UO_OUT:
    type: "output"
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UO_OUT: 0x88
  - name: "Out of Reset"
    cycles: 1
    values:
      RST_N: 1
      UO_OUT: 0x88
  - name: "Clocking"
    cycles: 8
    values:
      CLK: 1
      UO_OUT: 0x88
