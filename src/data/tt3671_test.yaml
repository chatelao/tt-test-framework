project: "Test (AND gate)"
metadata:
  source: "https://github.com/Biboulder/TinyTapeout-wokwi-template"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
test_steps:
- name: "AND 0 & 0"
  cycles: 1
  values:
    ui_in: 0b00000000
    uo_out: 0b00000000
- name: "AND 1 & 0"
  cycles: 1
  values:
    ui_in: 0b00000001
    uo_out: 0b00000000
- name: "AND 1 & 1"
  cycles: 1
  values:
    ui_in: 0b00000011
    uo_out: 0b00000001
- name: "Pass-through 4-7"
  cycles: 1
  values:
    ui_in: 0b10110000
    uo_out: 0b10110000
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3671_ui_in
    reg:
      reg:
      - name: input a
        bits: 1
      - name: input b
        bits: 1
      - bits: 6
        name: unused
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3671_uo_out
    reg:
      reg:
      - name: output and
        bits: 1
      - bits: 7
        name: unused
      config:
        hspace: 800
        bits: 8
