project: "Test (AND gate)"
metadata:
  source: "https://github.com/Biboulder/TinyTapeout-wokwi-template"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
test_steps:
  - name: "AND 0 & 0"
    cycles: 1
    values:
      ui_in: 0b00000000
      uo_out: 0b00000000
  - name: "AND 1 & 0"
    cycles: 1
    values:
      ui_in: 0b00000001
      uo_out: 0b00000000
  - name: "AND 1 & 1"
    cycles: 1
    values:
      ui_in: 0b00000011
      uo_out: 0b00000001
  - name: "Pass-through 4-7"
    cycles: 1
    values:
      ui_in: 0b10110000
      uo_out: 0b10110000
