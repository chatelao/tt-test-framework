project: "random stuff (NOT gates)"
metadata:
  source: "https://github.com/vlad-penchev/tinytapeoutz"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
test_steps:
  - name: "NOT test"
    cycles: 1
    values:
      ui_in: 0b00000100 # ui[2]=1, ui[3]=0
      uo_out: 0b00000100 # uo[2]=not ui[2]=0, uo[3]=not ui[3]=1 -> 0b0100 = 4
  - name: "NOT test 2"
    cycles: 1
    values:
      ui_in: 0b00001000 # ui[2]=0, ui[3]=1
      uo_out: 0b00001000 # uo[2]=not 0 = 1, uo[3]=not 1 = 0 -> 0b1000 = 8
