project: "Programmable 8-BIT CPU"
metadata:
  source: "https://github.com/dranoel06/tiny_tapeout_dranoel06"
  project_id: "3579"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  uio_in:
    type: "input"
    width: 8
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0
      uio_in: 0
  - name: "Idle"
    cycles: 1
    values:
      rst_n: 1
  - name: "Program Load Mode"
    cycles: 1
    values:
      uio_in: 0b10000000 # prog=1
  - name: "Load Instruction at Addr 0"
    cycles: 1
    values:
      uio_in: 0b10000000 # addr=0
      ui_in: 0x1F # Some instruction
  - name: "Run Mode"
    cycles: 1
    values:
      uio_in: 0b00000000 # prog=0
