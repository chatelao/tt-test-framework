project: "Programmable 8-BIT CPU"
metadata:
  source: "https://github.com/dranoel06/tiny_tapeout_dranoel06"
  project_id: "3579"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  uio_in:
    type: "input"
    width: 8
  rst_n:
    type: "input"
    width: 1
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    ui_in: 0
    uio_in: 0
- name: "Idle"
  cycles: 1
  values:
    rst_n: 1
- name: "Program Load Mode"
  cycles: 1
  values:
    uio_in: 0b10000000   # prog=1
- name: "Load Instruction at Addr 0"
  cycles: 1
  values:
    uio_in: 0b10000000   # addr=0
    ui_in: 0x1F   # Some instruction
- name: "Run Mode"
  cycles: 1
  values:
    uio_in: 0b00000000   # prog=0
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3579_ui_in
    reg:
      reg:
      - name: Programm_Input[0]
        bits: 1
      - name: Programm_Input[1]
        bits: 1
      - name: Programm_Input[2]
        bits: 1
      - name: Programm_Input[3]
        bits: 1
      - name: Programm_Input[4]
        bits: 1
      - name: Programm_Input[5]
        bits: 1
      - name: Programm_Input[6]
        bits: 1
      - name: Programm_Input[7]
        bits: 1
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3579_uo_out
    reg:
      reg:
      - name: Output[0]
        bits: 1
      - name: Output[1]
        bits: 1
      - name: Output[2]
        bits: 1
      - name: Output[3]
        bits: 1
      - name: Output[4]
        bits: 1
      - name: Output[5]
        bits: 1
      - name: Output[6]
        bits: 1
      - name: Output[7]
        bits: 1
      config:
        hspace: 800
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3579_uio_in
    reg:
      reg:
      - name: Address[0]
        bits: 1
      - name: Address[1]
        bits: 1
      - name: Address[2]
        bits: 1
      - name: Address[3]
        bits: 1
      - bits: 2
        name: unused
      - name: UART_TX
        bits: 1
      - name: Prog
        bits: 1
      config:
        hspace: 800
