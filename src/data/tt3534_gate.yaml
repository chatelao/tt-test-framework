project: "TinyTapeOut_gate"
metadata:
  source: "https://github.com/henrikscheidt99/tinytapeout"
signals:
  A: {name: "A", type: input, width: 1}
  B: {name: "B", type: input, width: 1}
  OUT: {name: "OUT", type: output, width: 1}
test_steps:
  - name: "0 AND 0"
    cycles: 1
    values: {A: 0, B: 0}
  - name: "0 AND 1"
    cycles: 1
    values: {A: 0, B: 1}
  - name: "1 AND 0"
    cycles: 1
    values: {A: 1, B: 0}
  - name: "1 AND 1"
    cycles: 1
    values: {A: 1, B: 1}
