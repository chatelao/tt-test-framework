project: "8-bit SEM Floating-Point Multiplier"
metadata:
  source: "https://github.com/DelosReyesJordan/ttihp26a-FP8-SEM-Multiplier"
signals:
  CLK: {name: "CLK", type: "clock", width: 1}
  RST_N: {name: "RST_N", type: "input", width: 1}
  ENA: {name: "ENA", type: "input", width: 1}
  A: {name: "A", type: "input", width: 8}
  B: {name: "B", type: "inout", width: 8}
  RESULT: {name: "RESULT", type: "output", width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      ENA: 0
      A: 0
      B: 0
  - name: "Zero Detection (0 * 1.0)"
    cycles: 1
    values:
      RST_N: 1
      ENA: 1
      A: 0
      B: 0x38 # 1.0 in SEM (0 0111 000)
  - name: "NaN Detection (NaN * 1.0)"
    cycles: 1
    values:
      A: 0x7F # S=0, E=1111, M=111
      B: 0x38
  - name: "Normal Multi (1.0 * 1.0)"
    cycles: 1
    values:
      A: 0x38
      B: 0x38
  - name: "Normal Multi (2.0 * 1.5)"
    cycles: 1
    values:
      A: 0x40 # 0 1000 000 = 2^1 * 1.0 = 2.0
      B: 0x3C # 0 0111 100 = 2^0 * 1.5 = 1.5
  - name: "Disabled"
    cycles: 1
    values:
      ENA: 0
      A: 0
      B: 0
