project: "sree"
metadata:
  source: "https://wokwi.com/projects/456578694921494529"
signals:
  UI_IN:
    type: "input"
    width: 8
  CLK:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UO_OUT:
    type: "output"
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      UI_IN: 0x00
      RST_N: 0
      UO_OUT: 0x00
  - name: "Out of Reset"
    cycles: 1
    values:
      UI_IN: 0x00
      RST_N: 1
      UO_OUT: 0x00
  - name: "Clocking"
    cycles: 3
    values:
      CLK: 1
      UO_OUT: 0x00
