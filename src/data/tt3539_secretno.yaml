project: "secretNo"
metadata:
  source: "https://github.com/thravax/tt-test"
signals:
  INPUT_A:
    type: "input"
    width: 1
  INPUT_B:
    type: "input"
    width: 1
  INPUT_C:
    type: "input"
    width: 1
  INPUT_D:
    type: "input"
    width: 1
  UO_OUT:
    type: "output"
    width: 8
  CLK:
    type: "clock"
    width: 1
  RST_N:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      INPUT_A: 0
      INPUT_B: 0
      INPUT_C: 0
      INPUT_D: 0
  - name: "Combination 1"
    cycles: 1
    values:
      RST_N: 1
      INPUT_A: 1
      INPUT_B: 0
      INPUT_C: 1
      INPUT_D: 1
  - name: "Combination 2"
    cycles: 1
    values:
      INPUT_A: 0
      INPUT_B: 1
      INPUT_C: 0
      INPUT_D: 1
