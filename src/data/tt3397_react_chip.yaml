project: "React Chip"
metadata:
  source: "https://github.com/Red2trappy/muxen_proj"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Input 0"
    cycles: 1
    values: {UI_IN: 0, UO_OUT: 0}
  - name: "Input 1"
    cycles: 1
    values: {UI_IN: 1, UO_OUT: 1} # ui[0] to uo[0]
  - name: "Toggle"
    cycles: 1
    values: {UI_IN: 0, UO_OUT: 0}
