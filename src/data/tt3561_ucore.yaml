project: "uCore"
metadata:
  source: "https://github.com/yJulian/tiny-tapeout"
signals:
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  uio_in:
    type: "input"
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0
      uio_in: 0
      uo_out: 0
  - name: "Load 0 to addr_oio via periphery"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0
      uio_in: 0b10011 # DATAFLOW OP, imm=3 (addr_oio)
  - name: "Write 0xAA to Reg 0"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0xAA
      uio_in: 0b01000 # MEM OP, imm=0
  - name: "Check uo_out (Reg 0)"
    cycles: 1
    values:
      rst_n: 1
      uo_out: 0xAA
  - name: "Write 0x55 to Reg 1"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x55
      uio_in: 0b01001 # MEM OP, imm=1
  - name: "Load 1 to addr_oio"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 1
      uio_in: 0b10011
  - name: "Check uo_out (Reg 1)"
    cycles: 1
    values:
      rst_n: 1
      uo_out: 0x55
