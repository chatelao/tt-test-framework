project: SEQ_MAC_INF_16H3 - Neural Network Inference Accelerator
metadata:
  source: https://github.com/Neuromurf/ttihp26a-inferenceFCNN-16h3
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {ui_in: 0, uio_in: 0, rst_n: 0}
- name: Ready status check
  cycles: 5
  values: {ui_in: 0, uio_in: 0, rst_n: 1}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3948_ui_in
    reg:
      reg:
      - name: data_in[0]
        bits: 1
      - name: data_in[1]
        bits: 1
      - name: data_in[2]
        bits: 1
      - name: data_in[3]
        bits: 1
      - name: data_in[4]
        bits: 1
      - name: data_in[5]
        bits: 1
      - name: data_in[6]
        bits: 1
      - name: data_in[7]
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3948_uo_out
    reg:
      reg:
      - name: result[0] / busy
        bits: 1
      - name: result[1] / done
        bits: 1
      - name: result[2] / ready
        bits: 1
      - name: result[3] / byte_valid
        bits: 1
      - name: best_class[0] / inf_done
        bits: 1
      - name: best_class[1] / layer
        bits: 1
      - name: best_class[2] / err_flag
        bits: 1
      - name: best_class[3] / reserved
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3948_uio_in
    reg:
      reg:
      - name: data_toggle
        bits: 1
      - name: data_type
        bits: 1
      - name: start
        bits: 1
      - name: mode[0]
        bits: 1
      - name: next_byte
        bits: 1
      - name: soft_rst
        bits: 1
      - name: mode[1]
        bits: 1
      - name: status_sel
        bits: 1
      config:
        hspace: 800
        bits: 8
