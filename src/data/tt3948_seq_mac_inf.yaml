project: SEQ_MAC_INF_16H3 - Neural Network Inference Accelerator
metadata:
  source: https://github.com/Neuromurf/ttihp26a-inferenceFCNN-16h3
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
  - name: Reset
    cycles: 1
    values: {ui_in: 0, uio_in: 0, rst_n: 0}
  - name: Ready status check
    cycles: 5
    values: {ui_in: 0, uio_in: 0, rst_n: 1}
