project: "bad multiplexer"
metadata:
  source: "https://github.com/jknotrowling/TinyTapeout"
  project_id: "3590"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8
  UIO:
    type: "inout"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UIO: 0
      UO_OUT: 0

  - name: "Pattern Test"
    cycles: 4
    values:
      RST_N: 1
      UI_IN: 0x55
      UIO: 0xAA
      UO_OUT: 0x00
