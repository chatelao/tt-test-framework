project: "VGA Rings"
metadata:
  source: "https://github.com/urish/tt-rings"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Reset and Initialization"
    cycles: 5
    values:
      UI_IN: 0
      UO_OUT: 0x88
  - name: "Change Speed and Direction"
    cycles: 5
    values:
      UI_IN: 0x03
      UO_OUT: 0x88
