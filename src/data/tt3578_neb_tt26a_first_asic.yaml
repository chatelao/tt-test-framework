project: "neb tt26a first asic"
metadata:
  source: "https://github.com/neb-o/tinytapeout_260207"
signals:
  UI_IN: {type: input, width: 8}
  UO_OUT: {type: output, width: 8}
test_steps:
  - name: "0 + 0"
    cycles: 1
    values: {UI_IN: 0, UO_OUT: 0}
  - name: "1 + 0"
    cycles: 1
    values: {UI_IN: 1, UO_OUT: 1}
  - name: "0 + 1"
    cycles: 1
    values: {UI_IN: 2, UO_OUT: 1}
  - name: "1 + 1"
    cycles: 1
    values: {UI_IN: 3, UO_OUT: 2}
