project: "8Bit Posit MAC Unit"
metadata:
  source: "https://github.com/RipunjayS109/posit_mac"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  ui[0:7]: {name: "DATA_IN", type: input, width: 8}
  uo[0:7]: {name: "DATA_OUT", type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ui[0:7]: 0
  - name: "Input A"
    cycles: 1
    values:
      ui[0:7]: 0x40
  - name: "Input B"
    cycles: 1
    values:
      ui[0:7]: 0x40
  - name: "Processing"
    cycles: 4
    values:
      ui[0:7]: 0
