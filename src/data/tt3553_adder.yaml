project: "adder"
metadata:
  source: "https://github.com/stsar/tiny_tapeout"
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}

test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    ui_in: 0
- name: "A=0, B=0, Cin=0"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0x00
    uo_out: 0x03
- name: "A=0, B=0, Cin=1"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0x80
    uo_out: 0x83
- name: "A=0, B=1, Cin=0"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0x40
    uo_out: 0x83
- name: "A=0, B=1, Cin=1"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0xC0
    uo_out: 0x43
- name: "A=1, B=0, Cin=0"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0x20
    uo_out: 0x83
- name: "A=1, B=0, Cin=1"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0xA0
    uo_out: 0x43
- name: "A=1, B=1, Cin=0"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0x60
    uo_out: 0x43
- name: "A=1, B=1, Cin=1"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0xE0
    uo_out: 0xC3
- name: "Counter Pulse"
  cycles: 3
  values:
    rst_n: 1
    ui_in: 0x00
    uo_out: 0x03
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3553_ui_in
    reg:
      reg:
      - bits: 5
        name: unused
      - name: a
        bits: 1
      - name: b
        bits: 1
      - name: c
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3553_uo_out
    reg:
      reg:
      - name: a
        bits: 1
      - name: b
        bits: 1
      - bits: 4
        name: unused
      - name: c
        bits: 1
      - name: d
        bits: 1
      config:
        hspace: 800
        bits: 8
