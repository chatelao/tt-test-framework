project: "Test Gates"
metadata:
  source: "https://github.com/AxuanW/wokwi-template"
signals:
  ui[0:7]: {name: "IN", type: input, width: 8}
  uo[0:7]: {name: "OUT", type: output, width: 8}
test_steps:
  - name: "Zeros"
    cycles: 1
    values:
      ui[0:7]: 0
  - name: "Ones"
    cycles: 1
    values:
      ui[0:7]: 0xFF
  - name: "Pattern"
    cycles: 1
    values:
      ui[0:7]: 0xAA
