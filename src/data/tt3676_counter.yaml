project: "Counter Circuit"
metadata:
  source: "https://github.com/Mr-Seoul/TinyTapeOutGDS"
signals:
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      uo_out: 0
  - name: "Count 1"
    cycles: 1
    values:
      rst_n: 1
      uo_out: 0b00001000
  - name: "Count 2"
    cycles: 1
    values:
      rst_n: 1
      uo_out: 0b00000100
  - name: "Count 3"
    cycles: 1
    values:
      rst_n: 1
      uo_out: 0b00001100
