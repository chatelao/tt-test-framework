project: "Tiny Tapeout Test"
metadata:
  source: "https://github.com/MertErmann/tiny_tapeout_1"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
test_steps:
- name: "NOT and pass-through test"
  cycles: 1
  values:
    ui_in: 0b11110000
    uo_out: 0b11111111
- name: "NOT and pass-through test 2"
  cycles: 1
  values:
    ui_in: 0b00001111
    uo_out: 0b00000000
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3576_ui_in
    reg:
      reg:
      - name: Sample in bit 0 (LSB)
        bits: 1
      - name: Sample in bit 1
        bits: 1
      - name: Sample in bit 2
        bits: 1
      - name: Sample in bit 3
        bits: 1
      - name: Sample in bit 4
        bits: 1
      - name: Sample in bit 5
        bits: 1
      - name: Sample in bit 6
        bits: 1
      - name: Sample in bit 7 (MSB, sign)
        bits: 1
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3576_uo_out
    reg:
      reg:
      - name: Filtered output bit 0 (LSB)
        bits: 1
      - name: Filtered output bit 1
        bits: 1
      - name: Filtered output bit 2
        bits: 1
      - name: Filtered output bit 3
        bits: 1
      - name: Filtered output bit 4
        bits: 1
      - name: Filtered output bit 5
        bits: 1
      - name: Filtered output bit 6
        bits: 1
      - name: Filtered output bit 7 (MSB, sign)
        bits: 1
      config:
        hspace: 800
