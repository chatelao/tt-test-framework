project: "Silly demo"
metadata:
  source: "https://github.com/BoredSemiRetiredEngineer/ttihp_submission"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0
      uo_out: 0
  - name: "Mask all"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0xFF
  - name: "Toggle clk"
    cycles: 4
    values:
      rst_n: 1
      ui_in: 0xFF
