project: "Silly demo"
metadata:
  source: "https://github.com/BoredSemiRetiredEngineer/ttihp_submission"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    ui_in: 0
    uo_out: 0
- name: "Mask all"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0xFF
- name: "Toggle clk"
  cycles: 4
  values:
    rst_n: 1
    ui_in: 0xFF
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3651_ui_in
    reg:
      reg:
      - name: ui_in[0]
        bits: 1
      - name: ui_in[1]
        bits: 1
      - name: ui_in[2]
        bits: 1
      - name: ui_in[3]
        bits: 1
      - name: ui_in[4]
        bits: 1
      - name: ui_in[5]
        bits: 1
      - name: ui_in[6]
        bits: 1
      - name: ui_in[7]
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3651_uo_out
    reg:
      reg:
      - name: uo_out[0]
        bits: 1
      - name: uo_out[1]
        bits: 1
      - name: uo_out[2]
        bits: 1
      - name: uo_out[3]
        bits: 1
      - name: uo_out[4]
        bits: 1
      - name: uo_out[5]
        bits: 1
      - name: uo_out[6]
        bits: 1
      - name: uo_out[7]
        bits: 1
      config:
        hspace: 800
        bits: 8
