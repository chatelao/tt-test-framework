project: "RS Half adder"
metadata:
  source: "https://github.com/yNiklas/tt-chip-design"
signals:
  CLK: {type: clock, width: 1}
  RST_N: {type: input, width: 1}
  UI_IN: {type: input, width: 8}
  UO_OUT: {type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values: {RST_N: 0, UI_IN: 0}
  - name: "Set S"
    cycles: 1
    values: {RST_N: 1, UI_IN: 0x01}
  - name: "Check S"
    cycles: 1
    values: {RST_N: 1, UI_IN: 0x01, UO_OUT: 0x01}
  - name: "Set R"
    cycles: 1
    values: {RST_N: 1, UI_IN: 0x02}
  - name: "Check R"
    cycles: 1
    values: {RST_N: 1, UI_IN: 0x02, UO_OUT: 0x00}
  - name: "Adder 1+2"
    cycles: 1
    values: {RST_N: 1, UI_IN: 0xC0, UO_OUT: 0x40}
  - name: "Adder 1+2+3"
    cycles: 1
    values: {RST_N: 1, UI_IN: 0xE0, UO_OUT: 0xC0}
