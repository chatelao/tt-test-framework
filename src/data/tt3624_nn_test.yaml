project: "Tiny Tapeout 1"
metadata:
  source: "https://github.com/makrs11/TinyTapeout-1"
  project_id: "3624"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  rst_n:
    type: "input"
    width: 1
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
- name: "Wait"
  cycles: 4
  values:
    rst_n: 1
- name: "Check Output"
  cycles: 1
  values:
    rst_n: 1
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3624_ui_in
    reg:
      reg:
      - name: NN data in 0
        bits: 1
      - name: NN data in 1
        bits: 1
      - name: NN data in 2
        bits: 1
      - name: NN data in 3
        bits: 1
      - name: NN data in 4
        bits: 1
      - name: NN data in 5
        bits: 1
      - name: NN data in 6
        bits: 1
      - name: NN data in 7
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3624_uo_out
    reg:
      reg:
      - name: NN data out 0
        bits: 1
      - name: NN data out 1
        bits: 1
      - name: NN data out 2
        bits: 1
      - name: NN data out 3
        bits: 1
      - name: NN data out 4
        bits: 1
      - name: NN data out 5
        bits: 1
      - name: NN data out 6
