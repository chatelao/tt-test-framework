project: "Tiny Tapeout 1"
metadata:
  source: "https://github.com/makrs11/TinyTapeout-1"
  project_id: "3624"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
  - name: "Wait"
    cycles: 4
    values:
      rst_n: 1
  - name: "Check Output"
    cycles: 1
    values:
      rst_n: 1
