project: "Cool Stuff"
metadata:
  source: "https://github.com/PaxPlay/tiny-tapeout-design"
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0
  - name: "A=0, B=0, Cin=0"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x00
      uo_out: 0x00
  - name: "A=1, B=0, Cin=0"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x01
      uo_out: 0x01
  - name: "A=0, B=1, Cin=0"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x02
      uo_out: 0x01
  - name: "A=1, B=1, Cin=0"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x03
      uo_out: 0x02
  - name: "A=0, B=0, Cin=1"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x80
      uo_out: 0x01
  - name: "A=1, B=0, Cin=1"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x81
      uo_out: 0x02
  - name: "A=0, B=1, Cin=1"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x82
      uo_out: 0x02
  - name: "A=1, B=1, Cin=1"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x83
      uo_out: 0x03
  - name: "Extra logic test 1"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x0C
      uo_out: 0x00
  - name: "Extra logic test 2"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x8C
      uo_out: 0x01
  - name: "Idle"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x00
      uo_out: 0x00
