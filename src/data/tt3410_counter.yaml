project: Counter
metadata:
  source: https://github.com/oscargus/ttsky-vhdl-makeAchip-izaha684
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0}
- name: Count Up
  cycles: 5
  values: {rst_n: 1, ui_in: 1}
- name: Count Down
  cycles: 5
  values: {rst_n: 1, ui_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3410_ui_in
    reg:
      reg:
      - name: direction [count up || down]
        bits: 1
      - bits: 7
        name: unused
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3410_uo_out
    reg:
      reg:
      - name: 7seg a
        bits: 1
      - name: 7seg b
        bits: 1
      - name: 7seg c
        bits: 1
      - name: 7seg d
        bits: 1
      - name: 7seg e
        bits: 1
      - name: 7seg f
        bits: 1
      - name: 7seg g
        bits: 1
      - name: 7seg h (dot)
        bits: 1
      config:
        hspace: 800
        bits: 8
