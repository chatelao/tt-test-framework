project: "Smart LED digital"
metadata:
  source: "https://github.com/hoene/tt_um_hoene_smart_led_digital"
  project_id: "3733"
signals:
  clk:
    type: clock
    width: 1
  rst_n:
    type: input
    width: 1
  UI_IN:
    type: input
    width: 8
  UO_OUT:
    type: output
    width: 8
  UIO:
    type: inout
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      clk: 0
      rst_n: 0
      UI_IN: 0
      UIO: 0
  - name: "Wait for reset"
    cycles: 1
    values:
      clk: 1
      rst_n: 0
  - name: "Disable test mode"
    cycles: 1
    values:
      clk: 0
      rst_n: 1
      UI_IN: 0b00000000
  - name: "Check clock out"
    cycles: 10
    values:
      clk: 1
  - name: "Set IN0"
    cycles: 1
    values:
      clk: 0
      UI_IN: 1
  - name: "Verify IN0SELECTED"
    cycles: 1
    values:
      clk: 1
      UO_OUT: 1
