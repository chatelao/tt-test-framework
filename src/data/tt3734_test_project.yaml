project: test project
metadata:
  source: https://github.com/tarkor111/tiny-tapeout-design
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Blink
  cycles: 20
  values: {rst_n: 1, ui_in: 0, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3734_ui_in
    reg:
      reg:
      - name: in0
        bits: 1
      - name: in1
        bits: 1
      - name: in2
        bits: 1
      - name: in3
        bits: 1
      - name: in4
        bits: 1
      - name: in5
        bits: 1
      - name: in6
        bits: 1
      - name: in7
        bits: 1
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3734_uo_out
    reg:
      reg:
      - name: out0
        bits: 1
      - name: out1
        bits: 1
      - name: out2
        bits: 1
      - name: out3
        bits: 1
      - name: out4
        bits: 1
      - name: out5
        bits: 1
      - name: out6
        bits: 1
      - name: out7
        bits: 1
      config:
        hspace: 800
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3734_uio_in
    reg:
      reg:
      - name: Data
        bits: 8
      config:
        hspace: 800
