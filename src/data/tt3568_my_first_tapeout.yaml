project: "My first tapeout"
metadata:
  source: "https://github.com/youju26/tinytapeout"
signals:
  UI_IN: {type: input, width: 8}
  UO_OUT: {type: output, width: 8}
test_steps:
  - name: "Input 0"
    cycles: 1
    values: {UI_IN: 0, UO_OUT: 0x3F}
  - name: "Input 1"
    cycles: 1
    values: {UI_IN: 1, UO_OUT: 0x3E}
  - name: "Input FF"
    cycles: 1
    values: {UI_IN: 0xFF, UO_OUT: 0xFE}
