project: "Tiny Tapeout Factory Test for ttihp-timer"
metadata:
  source: "https://github.com/ZeduloAdmin/ttihp-timer"
  project_id: "3755"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8
  UIO:
    type: "inout"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UIO: 0
      UO_OUT: 0

  - name: "Idle"
    cycles: 1
    values:
      RST_N: 1
      UIO: 0
      UO_OUT: 0

  - name: "Test Output 1"
    cycles: 1
    values:
      UIO: 0xF0 # uio_in[7:4] = 1 -> uo_out[0] = 1
      UO_OUT: 1

  - name: "Test Output 0"
    cycles: 1
    values:
      UIO: 0xE0 # uio_in[7:4] != 0xF -> uo_out[0] = 0
      UO_OUT: 0
