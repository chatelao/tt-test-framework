project: SimProc (Simple Processor)
metadata:
  source: https://github.com/ieeeuoft-asic/simproc
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 4
  values: {rst_n: 0, ui_in: 0x01, uio_in: 0x01}
- name: Config BAUD
  cycles: 1
  values: {rst_n: 1, ui_in: 0x01, uio_in: 0x01}
- name: UART Start Bit
  cycles: 4
  values: {rst_n: 1, ui_in: 0x00, uio_in: 0x01}
- name: UART D0 (0)
  cycles: 4
  values: {rst_n: 1, ui_in: 0x00, uio_in: 0x01}
- name: UART D1 (0)
  cycles: 4
  values: {rst_n: 1, ui_in: 0x00, uio_in: 0x01}
- name: UART D2 (0)
  cycles: 4
  values: {rst_n: 1, ui_in: 0x00, uio_in: 0x01}
- name: UART D3 (0)
  cycles: 4
  values: {rst_n: 1, ui_in: 0x00, uio_in: 0x01}
- name: UART D4 (1)
  cycles: 4
  values: {rst_n: 1, ui_in: 0x01, uio_in: 0x01}
- name: UART D5 (1)
  cycles: 4
  values: {rst_n: 1, ui_in: 0x01, uio_in: 0x01}
- name: UART D6 (1)
  cycles: 4
  values: {rst_n: 1, ui_in: 0x01, uio_in: 0x01}
- name: UART D7 (1)
  cycles: 4
  values: {rst_n: 1, ui_in: 0x01, uio_in: 0x01}
- name: UART Stop Bit
  cycles: 4
  values: {rst_n: 1, ui_in: 0x01, uio_in: 0x01}
- name: Wait for EXEC
  cycles: 5
  values: {rst_n: 1, ui_in: 0x01, uio_in: 0x01}
bitfields:
- name: Config BAUD
  items:
  - signal: uio_in
    description: BAUD Rate (Cycles per bit = {uio_in, 2'b00})
    svg: tt3415_uio_in_baud
    reg:
      reg:
      - name: BAUD[7:0]
        bits: 8
      config:
        hspace: 800
