project: "Spongent-88 Hash Accelerator"
metadata:
  source: https://github.com/imix/ttihp-spongent88
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
bitfields:
- name: 'Bus Interface (uio_in)'
  items:
  - signal: uio_in
    description: Control and Address bus
    svg: tt4073_uio_in
    reg:
      reg:
      - {name: addr, bits: 3}
      - {name: wr_strobe, bits: 1}
      - {name: rd_strobe, bits: 1}
      - {name: unused, bits: 3}
      config: {bits: 8}
- name: 'Status Interface (uio_out)'
  items:
  - signal: uio_out
    description: Output status flags
    svg: tt4073_uio_out
    reg:
      reg:
      - {name: busy, bits: 1}
      - {name: out_valid, bits: 1}
      - {name: unused, bits: 6}
      config: {bits: 8}
- name: 'Data Interface (ui_in/uo_out)'
  items:
  - signal: ui_in
    description: Input data byte (latched on write strobe)
    svg: tt4073_data_byte
    reg:
      reg:
      - {name: data, bits: 8}
      config: {bits: 8}
  - signal: uo_out
    description: Current digest byte (LSB first)
    svg: tt4073_data_byte
    reg:
      reg:
      - {name: data, bits: 8}
      config: {bits: 8}
test_cases:
- name: Hash 0x00 (KAT)
  test_steps:
  - name: Reset
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0x0
      uio_in: 0x0
  - name: Idle
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x0
      uio_in: 0x0
  - name: CMD Reset (Addr 0, Data 0)
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x0
      uio_in: 0x8
  - name: Deassert Write
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x0
      uio_in: 0x0
  - name: Absorb 0x0 (Addr 1, Data 0x0)
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x0
      uio_in: 0x9
  - name: Deassert Write
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x0
      uio_in: 0x0
  - name: Wait for Permutation (25 cycles)
    cycles: 25
    values:
      rst_n: 1
      ui_in: 0x0
      uio_in: 0x0
  - name: 'Hash CMD (Addr 0, Data 2: Pad 0x81 + Squeeze)'
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x2
      uio_in: 0x8
  - name: Deassert Write
