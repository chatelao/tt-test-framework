- name: "Deassert Read"
  cycles: 1
  values: {rst_n: 1, ui_in: 0, uio_in: 0x00}
- name: "Read Digest Byte 6 (Expected 0xeb)"
  cycles: 1
  values: {rst_n: 1, ui_in: 0, uio_in: 0}
  expected: {uo_out: 0xeb}
- name: "Advance Read"
  cycles: 1
  values: {rst_n: 1, ui_in: 0, uio_in: 0x12}
- name: "Deassert Read"
