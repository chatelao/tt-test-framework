- name: "Deassert Read"
  cycles: 1
  values: {rst_n: 1, ui_in: 0, uio_in: 0x00}
- name: "Read Digest Byte 5 (Expected 0x7f)"
  cycles: 1
  values: {rst_n: 1, ui_in: 0, uio_in: 0}
  expected: {uo_out: 0x7f}
- name: "Advance Read"
