project: "xorshift"
metadata:
  source: "https://github.com/oscargus/byggenchip"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  RST_N: {name: "RST_N", type: input, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UI_IN: 0
  - name: "Running"
    cycles: 10
    values:
      RST_N: 1
      UI_IN: 0xAA
