project: Classic 8-bit era Programmable Sound Generator SN76489
metadata:
  source: https://github.com/rejunity/tt05-psg-sn76489
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0x07}
- name: Write Init
  cycles: 5
  values: {rst_n: 1, ui_in: 0x80, uio_in: 0x06}
- name: Idle
  cycles: 5
  values: {rst_n: 1, ui_in: 0, uio_in: 0x07}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3430_ui_in
    reg:
      reg:
      - name: D0 data bus
        bits: 1
      - name: D1 data bus
        bits: 1
      - name: D2 data bus
        bits: 1
      - name: D3 data bus
        bits: 1
      - name: D4 data bus
        bits: 1
      - name: D5 data bus
        bits: 1
      - name: D6 data bus
        bits: 1
      - name: D7 data bus
        bits: 1
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3430_uo_out
    reg:
      reg:
      - name: digital audio LSB
        bits: 1
      - name: digital audio
        bits: 6
      - name: digital audio MSB
        bits: 1
      config:
        hspace: 800
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3430_uio_in
    reg:
      reg:
      - name: (in)  **/WE** write enable
        bits: 1
      - name: (in)  **SEL0** clock divider
        bits: 1
      - name: (in)  **SEL1** clock divider
        bits: 1
      - name: (out) channel 0 (PWM)
        bits: 1
      - name: (out) channel 1 (PWM)
        bits: 1
      - name: (out) channel 2 (PWM)
        bits: 1
      - name: (out) channel 3 (PWM)
        bits: 1
      - name: (out) AUDIO OUT master (PWM)
        bits: 1
      config:
        hspace: 800
