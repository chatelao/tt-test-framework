project: "Tadder"
metadata:
  source: "https://github.com/potatojuicemachine/tiny-tapeout"
  project_id: "3508"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
test_steps:
- name: "Input 0"
  cycles: 5
  values:
    ui_in: 0x00
- name: "Set values"
  cycles: 5
  values:
    ui_in: 0x11   # a1=1, b1=1
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3508_ui_in
    reg:
      reg:
      - name: a1
        bits: 1
      - name: a2
        bits: 1
      - name: a3
        bits: 1
      - name: a4
        bits: 1
      - name: b1
        bits: 1
      - name: b2
        bits: 1
      - name: b3
        bits: 1
      - name: b4
        bits: 1
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3508_uo_out
    reg:
      reg:
      - name: o1
        bits: 1
      - name: o2
        bits: 1
      - name: o3
        bits: 1
      - name: o4
        bits: 1
      - name: o5
        bits: 1
      - name: o6
        bits: 1
      - name: o7
        bits: 1
      - bits: 1
        name: unused
      config:
        hspace: 800
