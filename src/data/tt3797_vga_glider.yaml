project: "DKTT01 - VGA Glider"
metadata:
  source: "https://github.com/dinukuk/tt_test01"
signals:
  CLK: {name: 'CLK', type: clock, width: 1}
  RST_N: {name: 'RST_N', type: input, width: 1}
  HSYNC: {name: 'HSYNC', type: output, width: 1}
  VSYNC: {name: 'VSYNC', type: output, width: 1}
  RGB: {name: 'RGB', type: output, width: 6}
test_steps:
  - name: "Reset"
    cycles: 2
    values:
      RST_N: 0
  - name: "VGA Active"
    cycles: 100
    values:
      RST_N: 1
