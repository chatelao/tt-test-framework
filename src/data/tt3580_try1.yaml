project: "Try1"
metadata:
  source: "https://github.com/ManaOverflow/TinyTapeoutWorkshop"
  project_id: "3580"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UO_OUT: 0

  - name: "Pattern 0xA3"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0xA3
      UO_OUT: 0xA3

  - name: "Pattern 0x5C"
    cycles: 1
    values:
      UI_IN: 0x5C
      UO_OUT: 0x5C
