project: "WIP Bin to Dec (OR Logic)"
metadata:
  source: "https://github.com/SciFiCarrot/tiny-tapeout-workshop"
signals:
  CLK: {name: 'CLK', type: clock, width: 1}
  RST_N: {name: 'RST_N', type: input, width: 1}
  UI_IN: {name: 'UI_IN', type: input, width: 8}
  UO_OUT: {name: 'UO_OUT', type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UI_IN: 0
  - name: "Logic Test 1"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0x01
  - name: "Logic Test 2"
    cycles: 1
    values:
      UI_IN: 0x02
  - name: "Logic Test 3"
    cycles: 1
    values:
      UI_IN: 0x03
