project: "Count Upwards (7-segment)"
metadata:
  source: "https://github.com/Andreas-Noebel/Tiny-Tapeout"
signals:
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    uo_out: 0
- name: "Count 0 (0x3F)"
  cycles: 1
  values:
    rst_n: 1
    uo_out: 0x3F
- name: "Count 1 (0x06)"
  cycles: 1
  values:
    rst_n: 1
    uo_out: 0x06
- name: "Count 2 (0x5B)"
  cycles: 1
  values:
    rst_n: 1
    uo_out: 0x5B
bitfields:
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3611_uo_out
    reg:
      reg:
      - name: 7-Segment a
        bits: 1
      - name: 7-Segment b
        bits: 1
      - name: 7-Segment c
        bits: 1
      - name: 7-Segment d
        bits: 1
      - name: 7-Segment e
        bits: 1
      - name: 7-Segment f
        bits: 1
      - name: 7-Segment g
        bits: 1
      - name: 7-Segment h
        bits: 1
      config:
        hspace: 800
