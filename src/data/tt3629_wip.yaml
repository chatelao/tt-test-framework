project: "WIP (Logic & Pass-through)"
metadata:
  source: "https://github.com/kmosta19/TinyTapeoutProject"
signals:
  CLK: {name: 'CLK', type: clock, width: 1}
  RST_N: {name: 'RST_N', type: input, width: 1}
  UI_IN: {name: 'UI_IN', type: input, width: 8}
  UO_OUT: {name: 'UO_OUT', type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UI_IN: 0
  - name: "Pattern 1 (0x00)"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0x00
  - name: "Pattern 2 (0x0F)"
    cycles: 1
    values:
      UI_IN: 0x0F
  - name: "Pattern 3 (0xF0)"
    cycles: 1
    values:
      UI_IN: 0xF0
  - name: "Pattern 4 (0xAA)"
    cycles: 1
    values:
      UI_IN: 0xAA
