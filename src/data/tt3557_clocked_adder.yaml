project: "Clocked Full Adder"
metadata:
  source: "https://github.com/tobiasgreiser/tiny_tapeout_workshop"
signals:
  A:
    type: "input"
    width: 1
  B:
    type: "input"
    width: 1
  Cin:
    type: "input"
    width: 1
  S:
    type: "output"
    width: 1
  Cout:
    type: "output"
    width: 1

test_steps:
  - name: "Initial state"
    cycles: 1
    values:
      A: 0
      B: 0
      Cin: 0
  - name: "A=1, B=1 -> Sum=0, Cout=1 (Clocked)"
    cycles: 1
    values:
      A: 1
      B: 1
      Cin: 0
      S: 0
      Cout: 1
