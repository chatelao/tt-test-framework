project: Custom coprocessor
metadata:
  source: https://github.com/GianmarcoFortunelli/TT_coprocessor
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Idle
  cycles: 10
  values: {rst_n: 1, ui_in: 0, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt4006_ui_in
    reg:
      reg:
      - name: ext_progr (start/hold transaction)
        bits: 1
      - name: unused
        bits: 3
      - name: in_data[0] (LSB of input nibble)
        bits: 1
      - name: in_data[1]
        bits: 1
      - name: in_data[2]
        bits: 1
      - name: in_data[3] (MSB of input nibble)
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt4006_uo_out
    reg:
      reg:
      - name: result_valid
        bits: 1
      - name: frame_error
        bits: 1
      - name: busy
        bits: 1
      - name: unused
        bits: 1
      - name: out_data[0] (LSB of output nibble)
        bits: 1
      - name: out_data[1]
        bits: 1
      - name: out_data[2]
        bits: 1
      - name: out_data[3] (MSB of output nibble)
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt4006_uio_in
    reg:
      reg:
      - name: unused
        bits: 8
      config:
        hspace: 800
        bits: 8
