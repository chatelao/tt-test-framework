project: ttihp-26a-risc-v-wg-swc1
metadata:
  source: https://github.com/risc-v-wg/ttihp-26a-risc-v-wg-swc1
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Startup
  cycles: 10
  values: {rst_n: 1, ui_in: 0x20, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3772_ui_in
    reg:
      reg:
      - name: rx
        bits: 1
      - name: interrupt_0
        bits: 1
      - name: init_qspicmd
        bits: 1
      - name: init_latency[0]
        bits: 1
      - name: init_latency[1]
        bits: 1
      - name: init_cpu_start
        bits: 1
      - name: init_uart[0]
        bits: 1
      - name: init_uart[1]
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3772_uo_out
    reg:
      reg:
      - name: tx
        bits: 1
      - name: ce_n[0]
        bits: 1
      - name: ce_n[1]
        bits: 1
      - name: ce_n[2]
        bits: 1
      - name: sck
        bits: 1
      - name: rgb_led[0]
        bits: 1
      - name: rgb_led[1]
        bits: 1
      - name: rgb_led[2]
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3772_uio_in
    reg:
      reg:
      - name: sio[0]
        bits: 1
      - name: sio[1]
        bits: 1
      - name: sio[2]
        bits: 1
      - name: sio[3]
        bits: 1
      - name: gpio[0]
        bits: 1
      - name: gpio[1]
        bits: 1
      - name: gpio[2]
        bits: 1
      - name: gpio[3]
        bits: 1
      config:
        hspace: 800
        bits: 8
