project: "Undecided"
metadata:
  source: "https://github.com/schoeberl/ttihp-undecided"
  project_id: "3710"
signals:
  clk:
    type: clock
    width: 1
  rst_n:
    type: input
    width: 1
  UI_IN:
    type: input
    width: 8
  UO_OUT:
    type: output
    width: 8
  UIO_IN:
    type: input
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      clk: 0
      rst_n: 0
      UI_IN: 0
      UIO_IN: 0
  - name: "Wait for reset"
    cycles: 1
    values:
      clk: 1
      rst_n: 0
  - name: "Addition test 1"
    cycles: 1
    values:
      clk: 0
      rst_n: 1
      UI_IN: 5
      UIO_IN: 10
  - name: "Verify result 1"
    cycles: 1
    values:
      clk: 1
      UO_OUT: 15
  - name: "Addition test 2"
    cycles: 1
    values:
      clk: 0
      UI_IN: 100
      UIO_IN: 50
  - name: "Verify result 2"
    cycles: 1
    values:
      clk: 1
      UO_OUT: 150
