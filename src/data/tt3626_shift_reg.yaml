project: "Test - shift register"
metadata:
  source: "https://github.com/sam-m7/tinyTapeoutChip1"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0
      uo_out: 0
  - name: "Shift in 1"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 1
      uo_out: 0
  - name: "Shift"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0
      uo_out: 0
  - name: "Shift"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0
      uo_out: 0
  - name: "Shift out 1"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0
      uo_out: 1
