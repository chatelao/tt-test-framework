project: "Copenhagen Workshop Project"
metadata:
  source: "https://github.com/edwar1r/TinyTapeoutCopenhagenFeb2026"
signals:
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8
test_steps:
