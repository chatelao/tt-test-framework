project: "Test"
metadata:
  source: "https://github.com/can-lehmann/tt-fpga"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      UI_IN: 0
      UO_OUT: 0
  - name: "Input Pattern 1"
    cycles: 1
    values:
      UI_IN: 0x01
  - name: "Input Pattern 2"
    cycles: 1
    values:
      UI_IN: 0x02
  - name: "Input Pattern 3"
    cycles: 1
    values:
      UI_IN: 0x04
