project: "Clock Divider Test Project"
metadata:
  source: "https://github.com/werrever/TinyTapeout_werrever"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0
      uo_out: 0
  - name: "Select Clock"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0b00000101
      uo_out: 0
  - name: "Wait for clock"
    cycles: 8
    values:
      rst_n: 1
      ui_in: 0b00000101
      uo_out: 0
