project: "OCP MXFP8 Streaming MAC Unit"
metadata:
  source: "https://github.com/chatelao/ttihp-fp8-mul"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  uio_in:
    type: "input"
    width: 8
  uio_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0
      uio_in: 0
  - name: "Cycle 0: Fast Config (Packed E2M1)"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x80
      uio_in: 0x44
  - name: "Cycle 1: Load Scale A"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x7F
      uio_in: 0x00
  - name: "Cycle 2: Load Scale B"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x7F
      uio_in: 0x00
  - name: "Cycles 3-18: Stream Data (32x 1.0)"
    cycles: 16
    values:
      rst_n: 1
      ui_in: 0x22
      uio_in: 0x22
  - name: "Cycles 19-20: Wait for Capture"
    cycles: 2
    values:
      rst_n: 1
      ui_in: 0x00
      uio_in: 0x00
  - name: "Cycles 21-23: Output Result (Partial)"
    cycles: 3
    values:
      rst_n: 1
      ui_in: 0x00
      uio_in: 0x00
