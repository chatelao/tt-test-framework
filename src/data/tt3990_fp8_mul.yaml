project: "OCP MXFP8 Streaming MAC Unit"
metadata:
  source: "https://github.com/chatelao/ttihp-fp8-mul"
signals:
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8
  UIO:
    type: "inout"
    width: 8
test_steps:
  - name: "Reset"
    cycles: 2
    values:
      UI_IN: 0x00
      UIO: 0x00
  - name: "Cycle 0: Load Metadata"
    cycles: 1
    values:
      UI_IN: 0x80
      UIO: 0x00
  - name: "Cycle 1: Load Scale A / Config"
    cycles: 1
    values:
      UI_IN: 0x01
      UIO: 0x00
  - name: "Cycle 2: Load Scale B / Format B"
    cycles: 1
    values:
      UI_IN: 0x02
      UIO: 0x00
  - name: "Cycle 3: Start Streaming"
    cycles: 1
    values:
      UI_IN: 0xAA
      UIO: 0x55
