project: "OCP MXFP8 Streaming MAC Unit"
metadata:
  source: "https://github.com/chatelao/ttihp-fp8-mul"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  uio_in:
    type: "input"
    width: 8
  uio_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    ui_in: 0
    uio_in: 0
- name: "Cycle 0: Fast Config (Packed E2M1)"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0x80
    uio_in: 0x44
- name: "Cycle 1: Load Scale A"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0x7F
    uio_in: 0x00
- name: "Cycle 2: Load Scale B"
  cycles: 1
  values:
    rst_n: 1
    ui_in: 0x7F
    uio_in: 0x00
- name: "Cycles 3-18: Stream Data (32x 1.0)"
  cycles: 16
  values:
    rst_n: 1
    ui_in: 0x22
    uio_in: 0x22
- name: "Cycles 19-20: Wait for Capture"
  cycles: 2
  values:
    rst_n: 1
    ui_in: 0x00
    uio_in: 0x00
- name: "Cycles 21-23: Output Result (Partial)"
  cycles: 3
  values:
    rst_n: 1
    ui_in: 0x00
    uio_in: 0x00
bitfields:
- name: 'Cycle 0: Metadata Load'
  items:
  - signal: ui_in
    description: Metadata 0
    svg: tt3990_ui_in_c0
    reg:
      reg:
      - name: NBM Offset A
        bits: 3
      - name: LNS Mode
        bits: 2
      - name: Loopback
        bits: 1
      - name: Debug
        bits: 1
      - name: Short Protocol
        bits: 1
      config:
        hspace: 800
  - signal: uio_in
    description: Metadata 1
    svg: tt3990_uio_in_c0
    reg:
      reg:
      - name: NBM Offset B
        bits: 3
      - name: Rounding Mode
        bits: 2
      - name: Overflow
        bits: 1
      - name: Packed Mode
        bits: 1
      - name: MX+ Enable
        bits: 1
      config:
        hspace: 800
- name: 'Cycle 1: Scale A & Config A'
  items:
  - signal: ui_in
    description: Scale A (8-bit Unsigned)
    svg: tt3990_data_8b
    reg:
      reg:
      - name: Scale
        bits: 8
      config:
        hspace: 800
  - signal: uio_in
    description: Config A
    svg: tt3990_uio_in_c1
    reg:
      reg:
      - name: Format
        bits: 3
      - name: BM Index
        bits: 5
      config:
        hspace: 800
- name: 'Cycle 2: Scale B & Config B'
  items:
  - signal: ui_in
    description: Scale B (8-bit Unsigned)
    svg: tt3990_data_8b
    reg:
      reg:
      - name: Scale
        bits: 8
      config:
        hspace: 800
  - signal: uio_in
    description: Config B
    svg: tt3990_uio_in_c2
    reg:
      reg:
      - name: Format
        bits: 3
      - name: BM Index
        bits: 5
      config:
        hspace: 800
- name: 'Cycles 3-34: Element Streaming'
  items:
  - signal: ui_in
    description: Element A_i (8-bit Float/Int)
    svg: tt3990_data_8b
    reg:
      reg:
      - name: Data
        bits: 8
      config:
        hspace: 800
  - signal: uio_in
    description: Element B_i (8-bit Float/Int)
    svg: tt3990_data_8b
    reg:
      reg:
      - name: Data
        bits: 8
      config:
        hspace: 800
- name: 'Cycles 37-40: Result Output'
  items:
  - signal: uo_out
    description: Result Byte (serialized MSB to LSB)
    svg: tt3990_data_8b
    reg:
      reg:
      - name: Result
        bits: 8
      config:
        hspace: 800
