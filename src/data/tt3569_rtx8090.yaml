project: "RTX 8090"
metadata:
  source: "https://github.com/agentzz1/GDS_tinytapeout"
  project_id: "3569"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  uio_in:
    type: "input"
    width: 8
  uio_out:
    type: "output"
    width: 8
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ui_in: 0
      uio_in: 0
      rst_n: 0
  - name: "Idle"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0
      uio_in: 0
  - name: "Start Add: 3 + 4"
    cycles: 1
    values:
      ui_in: 0b10000011 # start=1, op=0, a=3
      uio_in: 0b00000100 # b=4, mode=0
  - name: "LOAD state"
    cycles: 1
    values:
      ui_in: 0b00000000 # clear start
  - name: "EXECUTE state"
    cycles: 1
    values:
      ui_in: 0
  - name: "DONE state - Result"
    cycles: 1
    values:
      uo_out: 7
      uio_out: 0b00001000 # result_valid=1
  - name: "Back to IDLE"
    cycles: 1
    values:
      uio_out: 0
