project: Design_test_workshop
metadata:
  source: https://github.com/donmonki/tt01_chip_design
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Test Logic
  cycles: 5
  values: {rst_n: 1, ui_in: 0xAA, uio_in: 0}
- name: Test Logic 2
  cycles: 5
  values: {rst_n: 1, ui_in: 0x55, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3722_ui_in
    reg:
      reg:
      - name: I1
        bits: 1
      - name: I2
        bits: 1
      - name: I3
        bits: 1
      - name: I4
        bits: 1
      - name: I5
        bits: 1
      - name: I6
        bits: 1
      - name: I7
        bits: 1
      - name: I8
        bits: 1
      config:
        hspace: 800
        bits: 8
