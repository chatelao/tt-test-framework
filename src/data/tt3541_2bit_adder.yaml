project: "tt3541-2bit-adder"
metadata:
  source: "https://github.com/zeynepdemirdag/tiny-tapeout-submission"
signals:
  A:
    type: "input"
    width: 1
  B:
    type: "input"
    width: 1
  Cin:
    type: "input"
    width: 1
  S:
    type: "output"
    width: 1
  Cout:
    type: "output"
    width: 1

test_steps:
  - name: "Cin=0, A=0, B=0"
    cycles: 1
    values:
      Cin: 0
      A: 0
      B: 0
      S: 0
      Cout: 0

  - name: "Cin=0, A=0, B=1"
    cycles: 1
    values:
      Cin: 0
      A: 0
      B: 1
      S: 1
      Cout: 0

  - name: "Cin=0, A=1, B=0"
    cycles: 1
    values:
      Cin: 0
      A: 1
      B: 0
      S: 1
      Cout: 0

  - name: "Cin=0, A=1, B=1"
    cycles: 1
    values:
      Cin: 0
      A: 1
      B: 1
      S: 0
      Cout: 1

  - name: "Cin=1, A=0, B=0"
    cycles: 1
    values:
      Cin: 1
      A: 0
      B: 0
      S: 1
      Cout: 0

  - name: "Cin=1, A=0, B=1"
    cycles: 1
    values:
      Cin: 1
      A: 0
      B: 1
      S: 0
      Cout: 1

  - name: "Cin=1, A=1, B=0"
    cycles: 1
    values:
      Cin: 1
      A: 1
      B: 0
      S: 0
      Cout: 1

  - name: "Cin=1, A=1, B=1"
    cycles: 1
    values:
      Cin: 1
      A: 1
      B: 1
      S: 1
      Cout: 1
