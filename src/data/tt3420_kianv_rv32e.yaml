project: KianV RISC-V RV32E Baremetal SoC
metadata:
  source: https://github.com/by17s/RISCV-KianV-BareMetalStyle
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
  - name: Reset
    cycles: 1
    values: {rst_n: 0, ui_in: 1}
  - name: UART Idle
    cycles: 10
    values: {rst_n: 1, ui_in: 1}
