project: KianV RISC-V RV32E Baremetal SoC
metadata:
  source: https://github.com/by17s/RISCV-KianV-BareMetalStyle
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 1}
- name: UART Idle
  cycles: 10
  values: {rst_n: 1, ui_in: 1}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3420_ui_in
    reg:
      reg:
      - name: uart_rx
        bits: 1
      - name: spi_sio1_so_miso0
        bits: 1
      - bits: 6
        name: unused
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3420_uo_out
    reg:
      reg:
      - name: spi_cen0
        bits: 1
      - name: spi_sclk0
        bits: 1
      - name: spi_sio0_si_mosi0
        bits: 1
      - name: pwm_o
        bits: 1
      - name: uart_tx
        bits: 1
      - name: led[0]
        bits: 1
      - name: led[1]
        bits: 1
      - name: led[2]
        bits: 1
      config:
        hspace: 800
        bits: 8
