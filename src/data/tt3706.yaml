project: "Scott's first Wokwi design"
metadata:
  source: "https://github.com/giffel1/Scott-s-first-Wokwi-design"
signals:
  UI_IN: {name: "UI_IN", type: "input", width: 8}
  UO_OUT: {name: "UO_OUT", type: "output", width: 8}
test_steps:
  - name: "Both Low (IN4=0, IN6=0)"
    cycles: 1
    values:
      UI_IN: 0
  - name: "One High (IN4=1, IN6=0)"
    cycles: 1
    values:
      UI_IN: 16
  - name: "Other High (IN4=0, IN6=1)"
    cycles: 1
    values:
      UI_IN: 64
  - name: "Both High (IN4=1, IN6=1)"
    cycles: 1
    values:
      UI_IN: 80
