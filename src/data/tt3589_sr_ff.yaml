  project_id: "3589"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
test_steps:
- name: "Initial state"
  cycles: 1
  values:
    ui_in: 0
- name: "Set input"
  cycles: 1
  values:
    ui_in: 1
- name: "Clock pulse"
  cycles: 1
  values:
    ui_in: 1
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3589_ui_in
    reg:
      reg:
      - name: input a
        bits: 1
      - name: input b
        bits: 1
      - bits: 6
        name: unused
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3589_uo_out
    reg:
      reg:
      - name: output and
        bits: 1
      - name: output nand
        bits: 1
      - name: output or
        bits: 1
      - name: output clock div 16
        bits: 1
      - name: output clock div 12
        bits: 1
      - bits: 3
        name: unused
      config:
        hspace: 800
