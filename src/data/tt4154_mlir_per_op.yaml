project: "Pattern-Guided Arithmetic Optimizations with MLIR per-op"
metadata:
  author: "L. Ledoux"
  source: "https://github.com/Bynaryman/ttihp04_ieee754_perop"
signals:
  ui_in: {name: in_byte, type: input, width: 8}
  uo_out: {name: out_byte, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  ena: {name: ena, type: input, width: 1}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 2
  values: {rst_n: 0, ena: 1, ui_in: 0, uio_in: 0}
- name: Load 20 bytes (A=0, B=0, C=0)
  cycles: 20
  values: {rst_n: 1, ena: 1, ui_in: 0}
- name: Run (3 cycles)
  cycles: 3
  values: {rst_n: 1, ena: 1, ui_in: 0}
- name: Output (4 bytes)
  cycles: 4
  values: {rst_n: 1, ena: 1, ui_in: 0}
- name: Idle
  cycles: 1
  values: {rst_n: 1, ena: 1, ui_in: 0}
