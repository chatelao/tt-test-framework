project: "Tiny Tapeout N"
metadata:
  source: "https://github.com/Nama222/Tiny-Tapeout"
signals:
  CLK: {name: "CLK", type: "clock", width: 1}
  RST_N: {name: "RST_N", type: "input", width: 1}
  UI_IN: {name: "UI_IN", type: "input", width: 8}
  UO_OUT: {name: "UO_OUT", type: "output", width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UI_IN: 0
  - name: "XOR Test (0^0)"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0
  - name: "XOR Test (1^0)"
    cycles: 1
    values:
      UI_IN: 1
  - name: "XOR Test (0^1)"
    cycles: 1
    values:
      UI_IN: 2
  - name: "MUX A (SEL=0, A=1, B=0)"
    cycles: 1
    values:
      UI_IN: 32 # IN5=1
  - name: "MUX B (SEL=1, A=1, B=0)"
    cycles: 1
    values:
      UI_IN: 160 # IN7=1, IN5=1
  - name: "AND Test (CLK=1, IN4=1)"
    cycles: 1
    values:
      UI_IN: 16 # IN4=1
      CLK: 1
  - name: "Idle"
    cycles: 1
    values:
      UI_IN: 0
      CLK: 0
