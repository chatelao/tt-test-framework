project: "FOMO"
metadata:
  source: "https://github.com/algofoogle/ttihp26a-fomo"
  project_id: "3753"
signals:
  clk:
    type: clock
    width: 1
  rst_n:
    type: input
    width: 1
  UI_IN:
    type: input
    width: 8
  UO_OUT:
    type: output
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      clk: 0
      rst_n: 0
      UI_IN: 0
  - name: "Wait for reset"
    cycles: 1
    values:
      clk: 1
      rst_n: 0
  - name: "Enable video"
    cycles: 1
    values:
      clk: 0
      rst_n: 1
      UI_IN: 0
  - name: "Watch VGA sync"
    cycles: 20
    values:
      clk: 1
  - name: "Check HSync"
    cycles: 1
    values:
      clk: 0
      UO_OUT: 0x80 # HSync is bit 7
