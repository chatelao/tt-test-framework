project: "RGB PWM"
metadata:
  source: "https://github.com/JohannesNekes/Tiny-Tapeout-RGB-PWM"
  project_id: "3560"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UO_OUT: 0

  - name: "Idle"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0
      UO_OUT: 0

  - name: "Set Duty Cycle 50%"
    cycles: 4
    values:
      UI_IN: 128
      UO_OUT: "PWM"

  - name: "Set Duty Cycle 100%"
    cycles: 4
    values:
      UI_IN: 255
      UO_OUT: 1
