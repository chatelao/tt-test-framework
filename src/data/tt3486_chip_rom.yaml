project: "Chip ROM"
metadata:
  source: "https://github.com/TinyTapeout/tt-chip-rom"
signals:
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8
test_steps:
  - name: "Zero Address"
    cycles: 1
    values:
      UI_IN: 0x00
      UO_OUT: 0x00
  - name: "Pattern 0x55"
    cycles: 1
    values:
      UI_IN: 0x55
      UO_OUT: 0x55
  - name: "Pattern 0xAA"
    cycles: 1
    values:
      UI_IN: 0xAA
      UO_OUT: 0xAA
  - name: "Full Address"
    cycles: 1
    values:
      UI_IN: 0xFF
      UO_OUT: 0xFF
