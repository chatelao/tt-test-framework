project: "One One"
metadata:
  source: "https://github.com/gusish89/tinytapeout_wokwi0"
  project_id: "3700"
signals:
  ENA:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UI_IN:
    type: "input"
    width: 8
  UO_OUT:
    type: "output"
    width: 8

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ENA: 1
      RST_N: 0
      UI_IN: 0
      UO_OUT: 0

  - name: "Logic 00"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0b00
      UO_OUT: 0x00

  - name: "Logic 01"
    cycles: 1
    values:
      UI_IN: 0b01
      UO_OUT: 0x10

  - name: "Logic 10"
    cycles: 1
    values:
      UI_IN: 0b10
      UO_OUT: 0x00

  - name: "Logic 11"
    cycles: 1
    values:
      UI_IN: 0b11
      UO_OUT: 0x00
