project: "Tiny Tapeout Test Gates"
metadata:
  source: "https://github.com/YuriiPavlenko-DTU/FIRSTTEST"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values: {UI_IN: 0, UO_OUT: 0}
  - name: "All Inputs High"
    cycles: 1
    values: {UI_IN: 0xFF, UO_OUT: 1}
  - name: "Alternating Pattern"
    cycles: 1
    values: {UI_IN: 0xAA, UO_OUT: 0}
