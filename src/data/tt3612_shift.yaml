project: "6-bit Ring Register"
metadata:
  source: "https://github.com/flo100500/tinytapeout"
signals:
  clk: {name: "CLK", type: clock, width: 1}
  uo[0:5]: {name: "Q", type: output, width: 6}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      uo[0:5]: 0
  - name: "Cycle 1"
    cycles: 1
    values:
      uo[0:5]: 0 # Assuming starts at 0 and cycles 0
  - name: "Cycle 2"
    cycles: 1
    values:
      uo[0:5]: 0
