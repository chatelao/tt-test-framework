project: Kalman Filter for IMU
metadata:
  source: https://github.com/intv0id/tt-ihp-TinyKalman
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {ui_in: 0xFF, rst_n: 0}
- name: Idle (CS_n and UART_TX high)
  cycles: 5
  values: {ui_in: 0xFF, rst_n: 1}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3768_ui_in
    reg:
      reg:
      - name: Data
        bits: 8
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3768_uo_out
    reg:
      reg:
      - name: SPI_MOSI
        bits: 1
      - name: SPI_SCLK
        bits: 1
      - name: SPI_CS_N
        bits: 1
      - name: UART_TX
        bits: 1
      - bits: 4
        name: unused
      config:
        hspace: 800
        bits: 8
