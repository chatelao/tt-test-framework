project: "Johnson counter"
metadata:
  source: "https://github.com/EhsanKhodadad/ttihp-wokwi"
signals:
  CLK: {type: clock, width: 1}
  RST_N: {type: input, width: 1}
  UI_IN: {type: input, width: 8}
  UO_OUT: {type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values: {RST_N: 0, UI_IN: 0, UO_OUT: 0}
  - name: "Step 1"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0x80}
  - name: "Step 2"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0xC0}
  - name: "Step 3"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0xE0}
  - name: "Step 4"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0xF0}
  - name: "Step 5"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0xF8}
  - name: "Step 6"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0xFC}
  - name: "Step 7"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0xFE}
  - name: "Step 8"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0xFF}
  - name: "Step 9"
    cycles: 1
    values: {RST_N: 1, UO_OUT: 0x7F}
