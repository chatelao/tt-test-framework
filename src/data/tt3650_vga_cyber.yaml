project: "Cyber EMBEDDEDINN"
metadata:
  source: "https://github.com/vppillai/tt-vga-submission"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Reset State"
    cycles: 5
    values:
      UI_IN: 0
      UO_OUT: 0x88
  - name: "Palette Selection"
    cycles: 5
    values:
      UI_IN: 0x0C
      UO_OUT: 0x88
