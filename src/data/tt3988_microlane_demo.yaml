project: microlane demo project
metadata:
  source: https://github.com/htfab/ttihp-microlane-demo
signals:
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
  - name: Reset
    cycles: 1
    values: {rst_n: 0}
  - name: Scroll 'h'
    cycles: 1
    values: {rst_n: 1}
  - name: Scroll 'A'
    cycles: 1
    values: {rst_n: 1}
  - name: Scroll 'r'
    cycles: 1
    values: {rst_n: 1}
  - name: Scroll 'd'
    cycles: 1
    values: {rst_n: 1}
