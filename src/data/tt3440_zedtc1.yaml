project: Zedulo TestChip1
metadata:
  source: https://github.com/ZeduloTech/ttgf-zed_tc1
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 1}
- name: UART/SPI Idle
  cycles: 10
  values: {rst_n: 1, ui_in: 1}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3440_ui_in
    reg:
      reg:
      - name: UART_RX
        bits: 1
      - name: SPI_MISO
        bits: 1
      - bits: 6
        name: unused
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3440_uo_out
    reg:
      reg:
      - name: UART_TX
        bits: 1
      - name: SPI_SCL
        bits: 1
      - name: SPI_CS
        bits: 1
      - name: SPI_MOSI
        bits: 1
      - bits: 4
        name: unused
      config:
        hspace: 800
