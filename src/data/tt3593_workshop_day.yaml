project: "Workshop Day"
metadata:
  source: "https://github.com/Montagsfrei/TinyTapeoutWorkshop"
signals:
  UI_IN: {type: input, width: 8}
  UO_OUT: {type: output, width: 8}
test_steps:
  - name: "Initial"
    cycles: 1
    values: {UI_IN: 0, UO_OUT: 0}
  - name: "Set ui0"
    cycles: 1
    values: {UI_IN: 0x01, UO_OUT: 0x01}
  - name: "Set ui5"
    cycles: 1
    values: {UI_IN: 0x20, UO_OUT: 0x01}
  - name: "Set both"
    cycles: 1
    values: {UI_IN: 0x21, UO_OUT: 0}
