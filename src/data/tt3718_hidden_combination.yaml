project: Hidden combination
metadata:
  source: https://github.com/johannakin1/Hemmeligkode
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {ui_in: 0, rst_n: 0}
- name: Test Template Logic 1
  cycles: 1
  values: {ui_in: 0x55, rst_n: 1}
- name: Test Template Logic 2
  cycles: 1
  values: {ui_in: 0xAA, rst_n: 1}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3718_ui_in
    reg:
      reg:
      - name: goes into and gate
        bits: 1
      - name: goes to output 1
        bits: 1
      - bits: 6
        name: unused
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3718_uo_out
    reg:
      reg:
      - name: Data
        bits: 8
      config:
        hspace: 800
        bits: 8
