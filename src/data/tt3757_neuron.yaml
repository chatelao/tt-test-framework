project: "Neuromorphic Tile"
metadata:
  source: "https://github.com/crockpotveggies/neuron-ttihp"
signals:
  CLK: {name: 'CLK', type: clock, width: 1}
  RST_N: {name: 'RST_N', type: input, width: 1}
  IN_DATA: {name: 'IN_DATA', type: input, width: 8}
  OUT_DATA: {name: 'OUT_DATA', type: output, width: 8}
  UIO_IN: {name: 'UIO_IN', type: input, width: 8}
test_steps:
  - name: "Reset"
    cycles: 5
    values:
      RST_N: 0
      IN_DATA: 0
      UIO_IN: 0
  - name: "Idle"
    cycles: 5
    values:
      RST_N: 1
      IN_DATA: 0
      UIO_IN: 0
  - name: "Event In"
    cycles: 5
    values:
      IN_DATA: 0x81
      UIO_IN: 0
