project: "Johnson counter"
metadata:
  source: "https://wokwi.com/projects/456019228852926465"
signals:
  UI_IN:
    type: "input"
    width: 8
  CLK:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UO_OUT:
    type: "output"
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UO_OUT: 0x00
  - name: "Out of Reset"
    cycles: 1
    values:
      RST_N: 1
      UO_OUT: 0x00
  - name: "Step 1"
    cycles: 1
    values:
      CLK: 1
      UO_OUT: 0x01
  - name: "Step 2"
    cycles: 1
    values:
      CLK: 1
      UO_OUT: 0x03
  - name: "Step 3"
    cycles: 1
    values:
      CLK: 1
      UO_OUT: 0x07
