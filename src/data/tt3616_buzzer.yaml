project: "Two Song Buzzer Player"
metadata:
  source: "https://github.com/CT4111/test_WOKWI_Circute"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    ui_in: 0
    uo_out: 0
- name: "Play Song 0"
  cycles: 5
  values:
    rst_n: 1
    ui_in: 0
- name: "Play Song 1"
  cycles: 5
  values:
    rst_n: 1
    ui_in: 1
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3616_ui_in
    reg:
      reg:
      - name: Song select (0=NGGU, 1=Imperial March)
        bits: 1
      - name: Pause
        bits: 1
      - bits: 6
        name: unused
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3616_uo_out
    reg:
      reg:
      - name: Buzzer PWM output
        bits: 1
      - bits: 7
        name: unused
      config:
        hspace: 800
        bits: 8
