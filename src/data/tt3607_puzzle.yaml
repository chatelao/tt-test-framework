project: "Switch Puzzle Logic"
metadata:
  source: "https://github.com/RimaitosLab/TinyTapeoutWorkshop"
signals:
  ui[0]: {name: "A", type: input, width: 1}
  ui[1]: {name: "B", type: input, width: 1}
  ui[4:7]: {name: "PASS_IN", type: input, width: 4}
  uo[0]: {name: "XOR_OUT", type: output, width: 1}
  uo[1]: {name: "AND_OUT", type: output, width: 1}
  uo[4:7]: {name: "PASS_OUT", type: output, width: 4}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ui[0]: 0
      ui[1]: 0
      ui[4:7]: 0
  - name: "Logic Test 0+1"
    cycles: 1
    values:
      ui[0]: 0
      ui[1]: 1
      uo[0]: 1 # XOR
      uo[1]: 0 # AND
  - name: "Logic Test 1+1"
    cycles: 1
    values:
      ui[0]: 1
      ui[1]: 1
      uo[0]: 0 # XOR
      uo[1]: 1 # AND
  - name: "Pass-through Test"
    cycles: 1
    values:
      ui[4:7]: 0xA
      uo[4:7]: 0xA
