project: 2048 sliding tile puzzle game (VGA)
metadata:
  source: https://github.com/urish/tt-2048-game
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0}
- name: Sync Init
  cycles: 10
  values: {rst_n: 1, ui_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3425_ui_in
    reg:
      reg:
      - name: btn_up
        bits: 1
      - name: btn_down
        bits: 1
      - name: btn_left
        bits: 1
      - name: btn_right
        bits: 1
      - name: gamepad_latch
        bits: 1
      - name: gamepad_clk
        bits: 1
      - name: gamepad_data
        bits: 1
      - name: debug_mode
        bits: 1
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3425_uo_out
    reg:
      reg:
      - name: R1
        bits: 1
      - name: G1
        bits: 1
      - name: B1
        bits: 1
      - name: VSync
        bits: 1
      - name: R0
        bits: 1
      - name: G0
        bits: 1
      - name: B0
        bits: 1
      - name: HSync
        bits: 1
      config:
        hspace: 800
