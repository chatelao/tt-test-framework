project: "Tiny D-Cache"
metadata:
  source: "https://github.com/Niels5931/ttihp_simple_dcache"
signals:
  ui[0:3]: {name: "REQ_ADDR", type: input, width: 4}
  ui[4]: {name: "REQ_VALID", type: input, width: 1}
  ui[5]: {name: "REQ_WRITE", type: input, width: 1}
  uo[4]: {name: "REQ_READY", type: output, width: 1}
  uo[5]: {name: "RESP_VALID", type: output, width: 1}
  uo[0:3]: {name: "RESP_RDATA", type: output, width: 4}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ui[0:3]: 0
      ui[4]: 0
      ui[5]: 0
  - name: "Request Read Addr 0"
    cycles: 1
    values:
      ui[4]: 1
      ui[5]: 0
      ui[0:3]: 0
  - name: "Wait for ready"
    cycles: 1
    values:
      uo[4]: 1
  - name: "Wait for response"
    cycles: 2
    values:
      uo[5]: 1
