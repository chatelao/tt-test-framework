project: "LLR simple VGA GPU"
metadata:
  source: "https://github.com/leonllrmc/tinytapeout_26a_llrsub1"
signals:
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
- name: "Reset"
  cycles: 1
  values:
    rst_n: 0
    uo_out: 0
- name: "Wait for HSync"
  cycles: 10
  values:
    rst_n: 1
bitfields:
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3661_uo_out
    reg:
      reg:
      - name: R1
        bits: 1
      - name: G1
        bits: 1
      - name: B1
        bits: 1
      - name: VSync
        bits: 1
      - name: R0
        bits: 1
      - name: G0
        bits: 1
      - name: B0
        bits: 1
      - name: HSync
        bits: 1
      config:
        hspace: 800
        bits: 8
