project: "LLR simple VGA GPU"
metadata:
  source: "https://github.com/leonllrmc/tinytapeout_26a_llrsub1"
signals:
  uo_out:
    type: "output"
    width: 8
  clk:
    type: "clock"
    width: 1
  rst_n:
    type: "input"
    width: 1
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      uo_out: 0
  - name: "Wait for HSync"
    cycles: 10
    values:
      rst_n: 1
