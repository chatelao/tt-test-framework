project: "TinyTapeout Traffic Light Controller"
metadata:
  source: "https://github.com/adaptableCoder/TinyTapeout-VerilogTemplate"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Initial state (Red)"
    cycles: 1
    values: {UI_IN: 0, UO_OUT: 9} # ns_red uo[0], ew_red uo[3]
  - name: "Activity"
    cycles: 10
    values: {UI_IN: 10} # duration params
