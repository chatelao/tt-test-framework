project: "Just logic"
metadata:
  source: "https://github.com/Jannis-Uni/TinyTapeout"
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}

test_steps:
  - name: "Reset"
    cycles: 1
    values:
      rst_n: 0
      ui_in: 0
  - name: "Pattern Match"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x2B # 00101011 -> 0,1,3,5 are high, others low
      uo_out: 0x07
  - name: "Mismatch ui[0]"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x2A
      uo_out: 0x00
  - name: "Mismatch ui[1]"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x29
      uo_out: 0x00
  - name: "Mismatch ui[3]"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x23
      uo_out: 0x00
  - name: "Mismatch ui[5]"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x0B
      uo_out: 0x00
  - name: "High bits check ui[2]"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x2F
      uo_out: 0x00
  - name: "High bits check ui[4]"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x3B
      uo_out: 0x00
  - name: "High bits check ui[6]"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x6B
      uo_out: 0x00
  - name: "High bits check ui[7]"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0xAB
      uo_out: 0x00
  - name: "All Zero"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0x00
      uo_out: 0x00
  - name: "All One"
    cycles: 1
    values:
      rst_n: 1
      ui_in: 0xFF
      uo_out: 0x00
