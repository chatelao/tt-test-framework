project: "LISA 8-Bit Microcontroller"
metadata:
  source: "https://github.com/kdp1965/ttgf-um-lisa"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Initial state"
    cycles: 1
    values: {UI_IN: 0}
  - name: "Baud clock activity"
    cycles: 10
    values: {UI_IN: 128} # baud_clk is uo[7]
