project: "Test (XOR & D-FlipFlop)"
metadata:
  source: "https://github.com/Heinikm/TinyTapeout"
signals:
  CLK: {name: 'CLK', type: clock, width: 1}
  RST_N: {name: 'RST_N', type: input, width: 1}
  UI_IN: {name: 'UI_IN', type: input, width: 8}
  UO_OUT: {name: 'UO_OUT', type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
      UI_IN: 0
  - name: "XOR Test"
    cycles: 1
    values:
      RST_N: 1
      UI_IN: 0x03 # ui[0] ^ ui[1]
  - name: "FF Test"
    cycles: 2
    values:
      UI_IN: 0x01 # ui[0] into D of flop1
  - name: "Pass-through"
    cycles: 1
    values:
      UI_IN: 0x40 # ui[6]
