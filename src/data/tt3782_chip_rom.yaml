project: "Chip ROM"
metadata:
  source: "https://github.com/TinyTapeout/tt-chip-rom"
signals:
  ui[0:7]: {name: "addr", type: input, width: 8}
  uo[0:7]: {name: "data", type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ui[0:7]: 0
  - name: "Read Addr 0"
    cycles: 1
    values:
      ui[0:7]: 0x00
      uo[0:7]: 0x00 # ROM placeholder behavior (uo = ui)
  - name: "Read Addr 0x55"
    cycles: 1
    values:
      ui[0:7]: 0x55
      uo[0:7]: 0x55
  - name: "Read Addr 0xAA"
    cycles: 1
    values:
      ui[0:7]: 0xAA
      uo[0:7]: 0xAA
