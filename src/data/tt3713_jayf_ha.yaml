project: JayF-HA
metadata:
  source: https://github.com/Jfvind/tt-jfvind
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {ui_in: 0, rst_n: 0}
- name: Test Pattern 1 (Low nibble NOT, High nibble pass)
  cycles: 1
  values: {ui_in: 0x00, rst_n: 1}
- name: Test Pattern 2
  cycles: 1
  values: {ui_in: 0x0F, rst_n: 1}
- name: Test Pattern 3
  cycles: 1
  values: {ui_in: 0xF0, rst_n: 1}
- name: Test Pattern 4
  cycles: 1
  values: {ui_in: 0xFF, rst_n: 1}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3713_ui_in
    reg:
      reg:
      - name: input a
        bits: 1
      - name: input b
        bits: 1
      - bits: 6
        name: unused
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3713_uo_out
    reg:
      reg:
      - name: sevseg 0
        bits: 1
      - name: sevseg 1
        bits: 1
      - name: sevseg 2
        bits: 1
      - name: sevseg 3
        bits: 1
      - name: sevseg 4
        bits: 1
      - name: sevseg 5
        bits: 1
      - name: sevseg 6
        bits: 1
      - name: sevseg 7
        bits: 1
      config:
        hspace: 800
        bits: 8
