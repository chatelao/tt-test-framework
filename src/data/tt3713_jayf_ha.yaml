project: JayF-HA
metadata:
  source: https://github.com/Jfvind/tt-jfvind
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
  - name: Reset
    cycles: 1
    values: {ui_in: 0, rst_n: 0}
  - name: Test Pattern 1 (Low nibble NOT, High nibble pass)
    cycles: 1
    values: {ui_in: 0x00, rst_n: 1}
  - name: Test Pattern 2
    cycles: 1
    values: {ui_in: 0x0F, rst_n: 1}
  - name: Test Pattern 3
    cycles: 1
    values: {ui_in: 0xF0, rst_n: 1}
  - name: Test Pattern 4
    cycles: 1
    values: {ui_in: 0xFF, rst_n: 1}
