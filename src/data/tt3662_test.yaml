project: "ttip-test"
metadata:
  source: "https://github.com/YashKarthik/ttihp-counter"
signals:
  UI_IN:
    type: "input"
    width: 8
  CLK:
    type: "input"
    width: 1
  RST_N:
    type: "input"
    width: 1
  UO_OUT:
    type: "output"
    width: 8
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      UI_IN: 0x00
      RST_N: 0
      UO_OUT: 0x00
  - name: "Out of Reset"
    cycles: 1
    values:
      UI_IN: 0x00
      RST_N: 1
      UO_OUT: 0x00
  - name: "Pattern 1"
    cycles: 1
    values:
      UI_IN: 0x55
      UO_OUT: 0x00
  - name: "Pattern 2"
    cycles: 1
    values:
      UI_IN: 0xAA
      UO_OUT: 0x00
