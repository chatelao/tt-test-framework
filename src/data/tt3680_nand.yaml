project: "nand_gate"
metadata:
  source: "https://github.com/exp10r3/nand_gate"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "NAND(0,0) = 1"
    cycles: 1
    values: {UI_IN: 0, UO_OUT: 1}
  - name: "NAND(1,0) = 1"
    cycles: 1
    values: {UI_IN: 1, UO_OUT: 1}
  - name: "NAND(0,1) = 1"
    cycles: 1
    values: {UI_IN: 2, UO_OUT: 1}
  - name: "NAND(1,1) = 0"
    cycles: 1
    values: {UI_IN: 3, UO_OUT: 0}
