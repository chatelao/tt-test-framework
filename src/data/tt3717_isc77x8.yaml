project: "ISC77x8 Side Scrolling Display"
metadata:
  source: "https://github.com/HansAdam2077/ISC77x8"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  ui[0:7]: {name: "DATA_IN", type: input, width: 8}
  uo[0:7]: {name: "SEG", type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      ui[0:7]: 0
  - name: "Load"
    cycles: 1
    values:
      ui[0:7]: 0x55
  - name: "Active"
    cycles: 4
    values:
      ui[0:7]: 0
