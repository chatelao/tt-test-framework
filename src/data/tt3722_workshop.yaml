project: "Design_test_workshop"
metadata:
  source: "https://github.com/donmonki/tt01_chip_design"
signals:
  CLK: {name: 'CLK', type: clock, width: 1}
  RST: {name: 'RST', type: input, width: 1}
  UI_IN: {name: 'UI_IN', type: input, width: 8}
  UO_OUT: {name: 'UO_OUT', type: output, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST: 0
      UI_IN: 0
  - name: "Idle"
    cycles: 1
    values:
      RST: 1
      UI_IN: 0x00
  - name: "Test Inverters"
    cycles: 1
    values:
      UI_IN: 0x0F
  - name: "Check Inverters and Pass-through"
    cycles: 1
    values:
      UI_IN: 0xAA
  - name: "Check Inverters and Pass-through 2"
    cycles: 1
    values:
      UI_IN: 0x55
