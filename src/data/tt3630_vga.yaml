project: "VGA demo"
metadata:
  source: "https://github.com/mattvenn/ihp26a-vga-test"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  UI_IN: {name: "UI_IN", type: input, width: 8}
  UO_OUT: {name: "UO_OUT", type: output, width: 8}
test_steps:
  - name: "Initial Sync State"
    cycles: 5
    values:
      UI_IN: 0
      UO_OUT: 0x88
  - name: "Active Toggling"
    cycles: 5
    values:
      UO_OUT: 0x88
