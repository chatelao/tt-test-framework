project: "test"
metadata:
  source: "https://github.com/hemanthkrishna5/tiny_tape_out"
  project_id: "3504"
signals:
  ui_in:
    type: "input"
    width: 8
  uo_out:
    type: "output"
    width: 8
test_steps:
- name: "Initial"
  cycles: 5
  values:
    ui_in: 0x00
- name: "Set inputs"
  cycles: 5
  values:
    ui_in: 0x83   # a=1, b=1, d=1
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3504_ui_in
    reg:
      reg:
      - name: input a
        bits: 1
      - name: input b
        bits: 1
      - name: mux sel
        bits: 1
      - bits: 4
        name: unused
      - name: input d
        bits: 1
      config:
        hspace: 800
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3504_uo_out
    reg:
      reg:
      - name: seg a
        bits: 1
      - name: seg b
        bits: 1
      - name: seg c
        bits: 1
      - name: seg d
        bits: 1
      - name: seg e
        bits: 1
      - name: seg f
        bits: 1
      - name: seg g
        bits: 1
      - name: seg dp
        bits: 1
      config:
        hspace: 800
