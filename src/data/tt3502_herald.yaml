project: "Herald"
metadata:
  source: "https://github.com/pranav0x0112/ttihp26a-Herald"
signals:
  ui_in: {name: "ui_in", type: "input", width: 8}
  uo_out: {name: "uo_out", type: "output", width: 8}
  uio_in: {name: "uio_in", type: "input", width: 8}
  uio_out: {name: "uio_out", type: "output", width: 8}
  clk: {name: "clk", type: "clock", width: 1}
  rst_n: {name: "rst_n", type: "input", width: 1}
test_steps:
  - name: "Reset"
    cycles: 2
    values: {rst_n: 0, ui_in: 0x00, uio_in: 0x00}
  - name: "Idle"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x00, uio_in: 0x00}
  - name: "CMD_MAC_CLEAR"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x22, uio_in: 0x01}
  - name: "Back to IDLE"
    cycles: 2
    values: {rst_n: 1, ui_in: 0x00, uio_in: 0x00}
  - name: "CMD_MAC_MULTIPLY"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x20, uio_in: 0x01}
  - name: "Wait for BUSY"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x00, uio_in: 0x00}
  - name: "Load Operand A byte 0 (0x12)"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x12, uio_in: 0x01}
  - name: "Load Operand A byte 1 (0x34)"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x34, uio_in: 0x01}
  - name: "Load Operand A byte 2 (0x56)"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x56, uio_in: 0x01}
  - name: "Load Operand B byte 0 (0x78)"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x78, uio_in: 0x01}
  - name: "Load Operand B byte 1 (0x9A)"
    cycles: 1
    values: {rst_n: 1, ui_in: 0x9A, uio_in: 0x01}
  - name: "Load Operand B byte 2 (0xBC)"
    cycles: 1
    values: {rst_n: 1, ui_in: 0xBC, uio_in: 0x01}
  - name: "Processing"
    cycles: 30
    values: {rst_n: 1, ui_in: 0x00, uio_in: 0x00}
  - name: "Read result byte 0"
    cycles: 2
    values: {rst_n: 1, ui_in: 0x00, uio_in: 0x02}
  - name: "Read result byte 1"
    cycles: 2
    values: {rst_n: 1, ui_in: 0x00, uio_in: 0x02}
  - name: "Read result byte 2"
    cycles: 2
    values: {rst_n: 1, ui_in: 0x00, uio_in: 0x02}
