project: Wildcat RISC-V
metadata:
  source: https://github.com/schoeberl/ttgf-wildcat
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 2
  values: {rst_n: 0, ui_in: 0}
- name: Boot Sequence
  cycles: 20
  values: {rst_n: 1, ui_in: 0x01}   # Enable LED via ui[0]
- name: Instruction Execution
  cycles: 50
  values: {rst_n: 1, ui_in: 0x01}
- name: Toggle LED Enable
  cycles: 10
  values: {rst_n: 1, ui_in: 0x00}
- name: Restore LED Enable
  cycles: 38
  values: {rst_n: 1, ui_in: 0x01}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3445_ui_in
    reg:
      reg:
      - name: in0
        bits: 1
      - name: in1
        bits: 1
      - name: in2
        bits: 1
      - name: in3
        bits: 1
      - name: in4
        bits: 1
      - name: in5
        bits: 1
      - name: in6
        bits: 1
      - name: in7
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3445_uo_out
    reg:
      reg:
      - name: out0
        bits: 1
      - name: out1
        bits: 1
      - name: out2
        bits: 1
      - name: out3
        bits: 1
      - name: out4
        bits: 1
      - name: out5
        bits: 1
      - name: out6
        bits: 1
      - name: out7
        bits: 1
      config:
        hspace: 800
        bits: 8
