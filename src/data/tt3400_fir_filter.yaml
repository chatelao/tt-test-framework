project: FIR Filter
metadata:
  source: https://github.com/hammal/vhdl_filter
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Idle
  cycles: 5
  values: {rst_n: 1, ui_in: 0, uio_in: 0}
- name: Load Input
  cycles: 1
  values: {rst_n: 1, ui_in: 0x55, uio_in: 1}
- name: Filter Operation
  cycles: 10
  values: {rst_n: 1, ui_in: 0, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3400_ui_in
    reg:
      reg:
      - name: input signal
        bits: 8
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3400_uo_out
    reg:
      reg:
      - name: output signal
        bits: 8
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3400_uio_in
    reg:
      reg:
      - name: load signal
        bits: 1
      - bits: 7
        name: unused
      config:
        hspace: 800
        bits: 8
