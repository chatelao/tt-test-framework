project: 8-bit Prime Number Detector
metadata:
  source: https://github.com/obrhubr/ttihp-submission
signals:
  ui_in: {name: ui_in, type: input, width: 8}
  uo_out: {name: uo_out, type: output, width: 8}
  uio_in: {name: uio_in, type: input, width: 8}
  uio_out: {name: uio_out, type: output, width: 8}
  uio_oe: {name: uio_oe, type: output, width: 8}
  clk: {name: clk, type: clock, width: 1}
  rst_n: {name: rst_n, type: input, width: 1}
test_steps:
- name: Reset
  cycles: 1
  values: {rst_n: 0, ui_in: 0, uio_in: 0}
- name: Test 7 (Prime)
  cycles: 2
  values: {rst_n: 1, ui_in: 7, uio_in: 0}
- name: Test 8 (Not Prime)
  cycles: 2
  values: {rst_n: 1, ui_in: 8, uio_in: 0}
- name: Test 13 (Prime)
  cycles: 2
  values: {rst_n: 1, ui_in: 13, uio_in: 0}
bitfields:
- name: Input (ui_in)
  items:
  - signal: ui_in
    description: Input signal mappings
    svg: tt3949_ui_in
    reg:
      reg:
      - name: Number bit 0 (LSB)
        bits: 1
      - name: Number bit 1
        bits: 1
      - name: Number bit 2
        bits: 1
      - name: Number bit 3
        bits: 1
      - name: Number bit 4
        bits: 1
      - name: Number bit 5
        bits: 1
      - name: Number bit 6
        bits: 1
      - name: Number bit 7 (MSB)
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Output (uo_out)
  items:
  - signal: uo_out
    description: Output signal mappings
    svg: tt3949_uo_out
    reg:
      reg:
      - name: Segment a
        bits: 1
      - name: Segment b
        bits: 1
      - name: Segment c
        bits: 1
      - name: Segment d
        bits: 1
      - name: Segment e
        bits: 1
      - name: Segment f
        bits: 1
      - name: Segment g
        bits: 1
      - name: Decimal point (1 = prime)
        bits: 1
      config:
        hspace: 800
        bits: 8
- name: Bidirectional (uio_in)
  items:
  - signal: uio_in
    description: Bidirectional signal mappings
    svg: tt3949_uio_in
    reg:
      reg:
      - name: Data
        bits: 8
      config:
        hspace: 800
        bits: 8
