project: "VGA Drop (audio/visual demo)"
metadata:
  source: "https://github.com/rejunity/tt08-vga-drop"
signals:
  CLK: {name: "CLK", type: clock, width: 1}
  RST_N: {name: "RST_N", type: input, width: 1}
  R: {name: "R", type: output, width: 2}
  G: {name: "G", type: output, width: 2}
  B: {name: "B", type: output, width: 2}
  VSYNC: {name: "VSYNC", type: output, width: 1}
  HSYNC: {name: "HSYNC", type: output, width: 1}
  AUDIO: {name: "AUDIO", type: inout, width: 8}
test_steps:
  - name: "Reset"
    cycles: 1
    values:
      RST_N: 0
  - name: "Active"
    cycles: 10
    values:
      RST_N: 1
